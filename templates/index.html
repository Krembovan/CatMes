<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAM CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f111a; --surface: #1e212b; --primary: #ff4747; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Модальное окно удаления */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-card { 
            background: var(--surface); padding: 35px; border-radius: 24px; 
            width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .modal-card h2 { margin: 0 0 15px; font-size: 24px; }
        .modal-card p { color: #949ba4; margin-bottom: 25px; line-height: 1.5; }
        
        .checkbox-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 30px; cursor: pointer; }
        .checkbox-container input { width: 20px; height: 20px; accent-color: var(--primary); }

        .btn-row { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-gray { background: #3e4147; color: white; }
        .btn-red { background: var(--primary); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Контекстное меню */
        #ctx-menu { 
            display: none; position: fixed; background: #181922; 
            border-radius: 12px; padding: 8px; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #ff5c5c; transition: 0.2s; }
        .ctx-item:hover { background: rgba(255,92,92,0.1); }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2>Удалить чат?</h2>
            <p>Вы уверены? История переписки исчезнет навсегда.</p>
            <label class="checkbox-container">
                <input type="checkbox" id="delete-for-all-cb">
                <span>Удалить для собеседника</span>
            </label>
            <div class="btn-row">
                <button class="btn btn-gray" onclick="closeModal()">ОТМЕНА</button>
                <button class="btn btn-red" onclick="confirmDelete()">УДАЛИТЬ</button>
            </div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="openModal()">🗑️ Удалить чат</div>
    </div>

    <script>
        // Инициализация socket ПЕРВОЙ строкой скрипта
      const socket = io({
    transports: ["websocket", "polling"]
});
        let selectedRoom = null;

        function closeAllMenus() {
            document.getElementById('ctx-menu').style.display = 'none';
        }

        // Вызывать при правом клике на чат в списке
        function onRoomContextMenu(e, roomId) {
            e.preventDefault();
            e.stopPropagation();
            selectedRoom = roomId;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function openModal() {
            document.getElementById('delete-modal').style.display = 'flex';
            closeAllMenus();
        }

        function closeModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }

        function confirmDelete() {
            const forAll = document.getElementById('delete-for-all-cb').checked;
            socket.emit('delete_chat', {
                chat_id: selectedRoom,
                delete_for_all: forAll
            });
            closeModal();
        }

        // Слушаем глобальное удаление
        socket.on('chat_deleted_globally', (data) => {
            alert("Чат был удален");
            location.reload(); // Перезагружаем, чтобы обновить список комнат
        });

        // Слушаем локальное скрытие
        socket.on('chat_hidden_locally', () => {
            location.reload();
        });

        // Заглушка для теста: если кликнуть правой кнопкой по фону, откроется меню для "Общего" чата
        document.body.oncontextmenu = (e) => onRoomContextMenu(e, 'Общий');
    </script>
<h1 style="color: white; position: absolute; top: 10px; left: 10px; z-index: 9999;">ТЕСТ СВЯЗИ</h1>
</body>
</html>
