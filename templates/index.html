<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SKAM TEST</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            background: #0d1117;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #161b22;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            background: linear-gradient(135deg, #7c5cfc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin: 0;
        }
        .status { color: #10b981; margin-top: 20px; }
        input {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0d1117;
            color: white;
            margin: 10px;
            font-size: 1rem;
        }
        button {
            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            background: #7c5cfc;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        button:hover { background: #6a48e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ SKAM</h1>
        <p>v3.0 • Новый дизайн загружен!</p>
        <div class="status" id="status">🟢 Подключение...</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Пароль">
        <br>
        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '🟢 Подключено к серверу!';
        });
        
        function login() {
            const un = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value;
            if (un && pwd) {
                socket.emit('auth', { action: 'login', username: un, password: pwd });
            }
        }
        
        function register() {
            const un = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value;
            if (un && pwd) {
                socket.emit('auth', { action: 'register', username: un, display_name: un, password: pwd, password2: pwd });
            }
        }
        
        socket.on('auth_result', (data) => {
            if (data.success) {
                document.getElementById('status').innerHTML = '✅ Успешный вход: ' + data.user.display_name;
            } else {
                alert('Ошибка: ' + data.error);
            }
        });
    </script>
</body>
</html>
