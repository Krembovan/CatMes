<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SKAM MESSENGER</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --surface: #161b22; --primary: #6e57e0; 
            --accent: #4a90e2; --text: #e6edf3; --border: rgba(255,255,255,0.1); 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .sidebar-header { padding: 10px; font-weight: 900; color: var(--primary); font-size: 1.5rem; letter-spacing: -1px; }
        
        .section-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 20px 10px 10px; letter-spacing: 1px; }
        
        .item { padding: 12px 15px; cursor: pointer; border-radius: 14px; display: flex; align-items: center; gap: 10px; transition: 0.2s; color: #8b949e; }
        .item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .item.active { background: linear-gradient(90deg, rgba(110, 87, 224, 0.2), transparent); color: #fff; box-shadow: inset 4px 0 0 var(--primary); }

        /* Profile Bottom */
        .my-profile-btn { margin-top: auto; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border); }
        .avatar { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; background: #21262d; }

        /* Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; max-width: 80%; }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-content { background: var(--surface); padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; border: 1px solid var(--border); }
        .msg.my .msg-content { background: var(--primary); color: white; border: none; }

        /* Inputs */
        .input-box { padding: 20px 30px; display: flex; gap: 10px; }
        input[type="text"], input[type="password"] { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 25px; color: white; outline: none; }
        .btn-circle { background: var(--primary); border: none; width: 48px; height: 48px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--surface); padding: 30px; border-radius: 28px; width: 360px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .modal-card h2 { margin-top: 0; text-align: center; color: var(--primary); }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 5px; margin-left: 10px; }
        .btn-full { width: 100%; padding: 14px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal" style="display: flex;">
        <div class="modal-card">
            <h2>SKAM</h2>
            <div class="field">
                <label>Уникальный юзернейм (ID)</label>
                <input type="text" id="auth-username" placeholder="@username" style="width:100%; box-sizing:border-box">
            </div>
            <div class="field">
                <label>Имя профиля (Display Name)</label>
                <input type="text" id="auth-display" placeholder="Иван Иванов" style="width:100%; box-sizing:border-box">
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" id="auth-pass" placeholder="••••••••" style="width:100%; box-sizing:border-box">
            </div>
            <button class="btn-full" onclick="login()">ВОЙТИ / СОЗДАТЬ</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-card">
            <h2>Настройки</h2>
            <div class="field">
                <label>Аватарка (URL)</label>
                <input type="text" id="edit-avatar" style="width:100%; box-sizing:border-box">
            </div>
            <div class="field">
                <label>Имя</label>
                <input type="text" id="edit-display" style="width:100%; box-sizing:border-box">
            </div>
            <div class="field">
                <label>Юзернейм</label>
                <input type="text" id="edit-username" style="width:100%; box-sizing:border-box">
            </div>
            <div class="field">
                <label>Описание</label>
                <input type="text" id="edit-bio" style="width:100%; box-sizing:border-box">
            </div>
            <button class="btn-full" onclick="saveProfile()">СОХРАНИТЬ</button>
            <button class="btn-full" style="background:none; color:#8b949e" onclick="document.getElementById('profile-modal').style.display='none'">Отмена</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">SKAM</div>
            
            <div class="section-label">Каналы</div>
            <div id="room-list"></div>

            <div class="my-profile-btn" onclick="openProfile()">
                <img src="" id="my-ava" class="avatar">
                <div style="overflow:hidden">
                    <div id="my-name-display" style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis">Загрузка...</div>
                    <div id="my-user-display" style="font-size:0.75rem; color:#8b949e">@username</div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="m-input" placeholder="Написать в SKAM..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn-circle" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";

        function login() {
            const username = document.getElementById('auth-username').value;
            const display_name = document.getElementById('auth-display').value;
            const password = document.getElementById('auth-pass').value;
            if(username && password) {
                socket.emit('auth', { username, display_name, password });
            }
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'none';
                
                // Обновляем UI
                document.getElementById('my-name-display').innerText = myData.display_name;
                document.getElementById('my-user-display').innerText = '@' + myData.username;
                document.getElementById('my-ava').src = myData.avatar || 'https://i.pravatar.cc/150';
                
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function openProfile() {
            document.getElementById('edit-avatar').value = myData.avatar;
            document.getElementById('edit-display').value = myData.display_name;
            document.getElementById('edit-username').value = myData.username;
            document.getElementById('edit-bio').value = myData.bio;
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function saveProfile() {
            socket.emit('update_profile', {
                old_username: myData.username,
                new_username: document.getElementById('edit-username').value,
                display_name: document.getElementById('edit-display').value,
                avatar: document.getElementById('edit-avatar').value,
                bio: document.getElementById('edit-bio').value
            });
        }

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="item active" onclick="switchRoom('Общий')"># общий_канал</div>`;
            Object.keys(rooms).forEach(id => {
                list.innerHTML += `<div class="item" onclick="switchRoom('${id}')"># ${rooms[id].name.toLowerCase().replace(' ', '_')}</div>`;
            });
        });

        function send() {
            const input = document.getElementById('m-input');
            if(!input.value) return;
            socket.emit('message', {
                room: selectedRoom,
                text: input.value,
                user: myData.display_name,
                username: myData.username,
                avatar: myData.avatar
            });
            input.value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.username === myData.username ? 'my' : ''}`;
            div.innerHTML = `
                <img src="${msg.avatar}" class="avatar" style="width:30px; height:30px; margin-top:5px">
                <div>
                    <div style="font-size:0.7rem; color:#8b949e; margin-bottom:2px">${msg.user} (@${msg.username})</div>
                    <div class="msg-content">${msg.text}</div>
                </div>
            `;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('error', (data) => alert(data.msg));
    </script>
</body>
</html>
