<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER CHAT v2</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --surface: #161b22; 
            --primary: #6e57e0; 
            --accent: #4a90e2;  
            --text: #e6edf3; 
            --border: rgba(255,255,255,0.08); 
            --round: 24px; /* Глобальное скругление */
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Сайдбар с измененной структурой */
        .sidebar { 
            width: 300px; 
            background: var(--surface); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 15px;
            box-sizing: border-box;
        }

        .sidebar-header { 
            padding: 10px 15px 20px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* Список чатов - теперь это "плавающие" карточки */
        #room-list { 
            flex: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
        }

        .room-item { 
            padding: 14px 18px; 
            cursor: pointer; 
            color: #8b949e; 
            transition: 0.3s; 
            border-radius: 16px; /* Округлые чаты */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .room-item:hover { background: rgba(255, 255, 255, 0.03); color: #fff; }
        .room-item.active { 
            background: linear-gradient(90deg, rgba(110, 87, 224, 0.2), transparent); 
            color: var(--text); 
            box-shadow: inset 4px 0 0 var(--primary);
        }

        /* Профиль СЛЕВА ВНИЗУ */
        .my-profile { 
            margin-top: 15px;
            padding: 12px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 20px;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: 0.3s;
            border: 1px solid var(--border);
        }
        .my-profile:hover { background: rgba(110, 87, 224, 0.1); border-color: var(--primary); }

        .avatar { width: 40px; height: 40px; border-radius: 14px; background: #21262d; object-fit: cover; }
        
        /* Чат и сообщения */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; gap: 12px; max-width: 85%; }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-content { 
            background: var(--surface); 
            padding: 12px 18px; 
            border-radius: 22px; /* Очень круглые сообщения */
            font-size: 0.95rem; 
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .msg.my .msg-content { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; 
            border-bottom-right-radius: 4px; /* Стиль "хвостика" */
        }
        .msg:not(.my) .msg-content { border-bottom-left-radius: 4px; }

        /* Поле ввода */
        .input-wrapper { padding: 20px 30px 30px; }
        .input-area { 
            background: var(--surface); 
            padding: 8px 8px 8px 20px; 
            border-radius: 25px; 
            display: flex; 
            gap: 10px; 
            border: 1px solid var(--border);
            align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px 0; }
        .send-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: 0.3s;
        }
        .send-btn:hover { transform: scale(1.05); background: var(--accent); }

        /* Модалки */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--surface); padding: 30px; border-radius: var(--round); width: 350px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body onclick="hideContext()">

    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-card">
            <h2 style="text-align: center; margin-top: 0;">Welcome back</h2>
            <p style="color: #8b949e; text-align: center; font-size: 0.9rem;">Введите данные для входа в систему</p>
            <input type="text" id="auth-nick" placeholder="Username" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 10px; color: white;">
            <input type="password" id="auth-pass" placeholder="Password" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 20px; color: white;">
            <button class="send-btn" style="width: 100%; border-radius: 12px; height: 50px;" onclick="login()">ENTER CHAT</button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-top: 0;">Settings</h3>
            <label style="font-size: 0.8rem; color: #8b949e;">Avatar URL</label>
            <input type="text" id="edit-avatar" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin: 5px 0 15px; color: white;">
            <label style="font-size: 0.8rem; color: #8b949e;">Status</label>
            <input type="text" id="edit-bio" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin: 5px 0 20px; color: white;">
            <button class="send-btn" style="width: 100%; border-radius: 12px; height: 45px;" onclick="saveProfile()">SAVE</button>
            <button onclick="closeProfile()" style="width: 100%; background: transparent; border: none; color: #8b949e; margin-top: 10px; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">CYBER.IO</div>
            
            <div id="room-list">
                </div>

            <div class="my-profile" onclick="openProfile()">
                <img src="" id="my-ava" class="avatar">
                <div style="overflow: hidden;">
                    <div id="my-nick-display" style="font-weight: bold; white-space: nowrap; text-overflow: ellipsis;">User</div>
                    <div id="my-bio-display" style="font-size: 0.7rem; opacity: 0.6; white-space: nowrap; text-overflow: ellipsis;">Online</div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-wrapper">
                <div class="input-area">
                    <input type="text" id="m-input" placeholder="Write a message..." onkeypress="if(event.key==='Enter') send()">
                    <button class="send-btn" onclick="send()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";

        function login() {
            const nick = document.getElementById('auth-nick').value;
            const pass = document.getElementById('auth-pass').value;
            if(nick) socket.emit('auth', { nick, password: pass });
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'none';
                document.getElementById('my-nick-display').innerText = myData.nick;
                document.getElementById('my-bio-display').innerText = myData.bio || "Cyber Traveler";
                document.getElementById('my-ava').src = myData.avatar || 'https://i.pravatar.cc/100';
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function openProfile() { 
            document.getElementById('edit-avatar').value = myData.avatar;
            document.getElementById('edit-bio').value = myData.bio;
            document.getElementById('profile-modal').style.display = 'flex'; 
        }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function saveProfile() {
            socket.emit('update_profile', {
                nick: myData.nick,
                avatar: document.getElementById('edit-avatar').value,
                bio: document.getElementById('edit-bio').value
            });
        }

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.toggle('active', el.innerText.includes(id));
            });
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="room-item active" onclick="switchRoom('Общий')"># Global Hub</div>`;
            Object.keys(rooms).forEach(id => {
                list.innerHTML += `<div class="room-item" onclick="switchRoom('${id}')"># ${rooms[id].name}</div>`;
            });
        });

        function send() {
            const input = document.getElementById('m-input');
            if (!input.value) return;
            socket.emit('message', {
                room: selectedRoom,
                text: input.value,
                user: myData.nick,
                avatar: myData.avatar
            });
            input.value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.user === myData.nick ? 'my' : ''}`;
            div.innerHTML = `
                <img src="${msg.avatar || 'https://i.pravatar.cc/100'}" class="avatar" style="width:30px; height:30px; margin-top: 5px;">
                <div style="flex: 1;">
                    <div style="font-size: 0.7rem; color: #8b949e; margin: 0 10px 2px;">${msg.user}</div>
                    <div class="msg-content">${msg.text}</div>
                </div>
            `;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function hideContext() {}
    </script>
</body>
</html>
