<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SKAM MESSENGER</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --surface: #161b22; --primary: #6e57e0; 
            --accent: #4a90e2; --text: #e6edf3; --border: rgba(255,255,255,0.08); 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .sidebar-header { padding: 10px; font-weight: 900; color: var(--primary); font-size: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        
        .section-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin: 20px 10px 10px; letter-spacing: 1px; }
        
        .item { padding: 10px 15px; cursor: pointer; border-radius: 12px; display: flex; align-items: center; gap: 10px; transition: 0.2s; color: #8b949e; font-size: 0.9rem; }
        .item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .item.active { background: rgba(110, 87, 224, 0.15); color: #fff; box-shadow: inset 3px 0 0 var(--primary); }

        .badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.7rem; margin-left: auto; cursor: pointer; border: none; }

        /* Profile Bottom */
        .my-profile-btn { margin-top: auto; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border); }
        .avatar { width: 38px; height: 38px; border-radius: 10px; object-fit: cover; background: #21262d; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; max-width: 80%; }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-content { background: var(--surface); padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; border: 1px solid var(--border); }
        .msg.my .msg-content { background: var(--primary); color: white; border: none; }

        .input-box { padding: 20px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px 20px; border-radius: 25px; color: white; outline: none; }
        .btn-send { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-card { background: var(--surface); padding: 25px; border-radius: 24px; width: 320px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal" style="display: flex;">
        <div class="modal-card">
            <h2 style="text-align:center; color:var(--primary); margin-top:0">SKAM</h2>
            <input type="text" id="auth-username" placeholder="Уникальный @username" style="width:100%; box-sizing:border-box; margin-bottom:10px; padding:12px; border-radius:12px; border:1px solid var(--border); background:#0d1117; color:white">
            <input type="password" id="auth-pass" placeholder="Пароль" style="width:100%; box-sizing:border-box; margin-bottom:20px; padding:12px; border-radius:12px; border:1px solid var(--border); background:#0d1117; color:white">
            <button onclick="login()" style="width:100%; padding:14px; border-radius:14px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer">ВОЙТИ</button>
        </div>
    </div>

    <div id="friend-modal" class="modal">
        <div class="modal-card">
            <h3>Найти друга</h3>
            <input type="text" id="search-username" placeholder="@username" style="width:100%; box-sizing:border-box; margin-bottom:15px; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0d1117; color:white">
            <button onclick="sendFriendReq()" style="width:100%; padding:12px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:bold; cursor:pointer">ОТПРАВИТЬ ЗАПРОС</button>
            <button onclick="document.getElementById('friend-modal').style.display='none'" style="width:100%; background:none; border:none; color:#8b949e; margin-top:10px; cursor:pointer">Отмена</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>SKAM</span>
                <button onclick="document.getElementById('friend-modal').style.display='flex'" style="background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer">+</button>
            </div>
            
            <div class="section-label">Каналы</div>
            <div id="room-list"></div>

            <div class="section-label">Друзья</div>
            <div id="friend-list"></div>

            <div class="my-profile-btn" onclick="alert('Настройки вapp.py уже есть, используй предыдущую версию кода для полной формы!')">
                <img src="" id="my-ava" class="avatar">
                <div style="overflow:hidden">
                    <div id="my-dn" style="font-weight:bold; white-space:nowrap; text-overflow:ellipsis">Загрузка...</div>
                    <div id="my-un" style="font-size:0.75rem; color:#8b949e">@username</div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-box">
                <input type="text" id="m-input" placeholder="Написать в SKAM..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn-send" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";

        function login() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-pass').value;
            if(username && password) socket.emit('auth', { username, password });
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('my-dn').innerText = myData.display_name;
                document.getElementById('my-un').innerText = '@' + myData.username;
                document.getElementById('my-ava').src = myData.avatar;
                
                updateFriendList();
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function sendFriendReq() {
            const target = document.getElementById('search-username').value;
            socket.emit('send_friend_request', { my_username: myData.username, target_username: target });
            document.getElementById('friend-modal').style.display = 'none';
        }

        function updateFriendList() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            
            // Сначала запросы
            myData.requests.forEach(un => {
                list.innerHTML += `
                    <div class="item" style="border: 1px dashed var(--primary)">
                        <span>👤 @${un}</span>
                        <button class="badge" onclick="acceptFriend('${un}')">Принять</button>
                    </div>`;
            });

            // Потом друзья
            myData.friends.forEach(un => {
                list.innerHTML += `<div class="item" onclick="startPrivate('${un}')">🔵 @${un}</div>`;
            });
        }

        function acceptFriend(un) {
            socket.emit('accept_friend', { my_username: myData.username, target_username: un });
        }

        function startPrivate(un) {
            const chat_id = "priv_" + [myData.username, un].sort().join('_');
            switchRoom(chat_id);
        }

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="item active" onclick="switchRoom('Общий')"># общий_канал</div>`;
            Object.keys(rooms).forEach(id => {
                if(rooms[id].type !== 'private')
                    list.innerHTML += `<div class="item" onclick="switchRoom('${id}')"># ${rooms[id].name}</div>`;
            });
        });

        function send() {
            const input = document.getElementById('m-input');
            if(!input.value) return;
            socket.emit('message', {
                room: selectedRoom, text: input.value,
                user: myData.display_name, username: myData.username, avatar: myData.avatar
            });
            input.value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.username === myData.username ? 'my' : ''}`;
            div.innerHTML = `<div class="msg-content"><b>${msg.user}:</b><br>${msg.text}</div>`;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('friend_msg', (data) => alert(data.text));
    </script>
</body>
</html>
