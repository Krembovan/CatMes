<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CAT Messenger</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        :root {
            --bg: #ffffff;
            --side: #f8fafc;
            --surf: #f1f5f9;
            --prim: #4f46e5;
            --text: #0f172a;
            --sec: #64748b;
            --brd: rgba(0,0,0,0.08);
        }
        
        .dark {
            --bg: #0a0f18;
            --side: #0f172a;
            --surf: #1e293b;
            --prim: #6366f1;
            --text: #f8fafc;
            --sec: #94a3b8;
            --brd: rgba(255,255,255,0.08);
        }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 10px; }
        
        .glass { backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-anim { animation: fadeIn 0.2s ease; }
        
        .message-bubble-me { border-bottom-right-radius: 4px; }
        .message-bubble-other { border-bottom-left-radius: 4px; }
        
        .dropdown-menu {
            opacity: 0; transform: translateY(-8px) scale(0.96);
            transition: all 0.2s ease; pointer-events: none;
        }
        .dropdown-menu.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        
        @media (max-width: 768px) {
            .chats-sidebar { display: none; }
            .chats-sidebar.mobile-visible { display: flex; position: fixed; z-index: 50; width: 100%; height: 100%; }
        }
    </style>
</head>
<body class="dark">

    <!-- АВТОРИЗАЦИЯ -->
    <div id="auth" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-96 p-8 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-500/30">
                    <span class="text-white font-bold text-2xl">CAT</span>
                </div>
                <h2 class="text-2xl font-bold dark:text-white">Вход в мессенджер</h2>
            </div>
            <input id="uInp" class="w-full p-3 bg-gray-100 dark:bg-slate-700 border-none rounded-xl mb-3 outline-none focus:ring-2 focus:ring-indigo-400 dark:text-white" placeholder="Логин">
            <input id="pInp" type="password" class="w-full p-3 bg-gray-100 dark:bg-slate-700 border-none rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-400 dark:text-white" placeholder="Пароль">
            <button id="loginBtn" class="w-full p-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-all">Войти</button>
            <p class="text-center text-sm text-gray-500 mt-3">Новый пользователь? Просто введите логин и пароль</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="app" class="h-full w-full flex" style="display:none;">
        
        <!-- ЛЕВЫЙ САЙДБАР: Навигация -->
        <aside class="w-20 h-full flex flex-col items-center justify-between py-6 px-2 border-r glass bg-gray-50/80 dark:bg-slate-900/80 border-gray-200/60 dark:border-slate-700/50 z-20 shrink-0">
            <div class="flex flex-col items-center gap-8 w-full">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-bold text-xl">CAT</span>
                </div>
                <nav class="flex flex-col items-center gap-7 w-full">
                    <button onclick="switchRoom('Общий')" class="nav-btn p-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all">
                        <i data-lucide="message-circle" class="w-6 h-6 text-indigo-600 dark:text-indigo-400"></i>
                    </button>
                    <button onclick="switchRoom('Техподдержка')" class="nav-btn p-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all">
                        <i data-lucide="headphones" class="w-6 h-6 text-slate-500 dark:text-slate-400"></i>
                    </button>
                    <button onclick="switchRoom('Новости')" class="nav-btn p-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all">
                        <i data-lucide="newspaper" class="w-6 h-6 text-slate-500 dark:text-slate-400"></i>
                    </button>
                    <button onclick="switchRoom('Нейросеть')" class="nav-btn p-2 rounded-xl hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all">
                        <i data-lucide="sparkles" class="w-6 h-6 text-slate-500 dark:text-slate-400"></i>
                    </button>
                </nav>
            </div>
            <div class="flex flex-col items-center gap-6 w-full">
                <button id="themeToggle" class="p-2 rounded-xl bg-gray-200/70 dark:bg-slate-800 hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-all">
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-slate-700"></i>
                </button>
                <img id="myAvSmall" class="w-9 h-9 rounded-full cursor-pointer" onclick="openMyProfile()" style="object-fit:cover;">
            </div>
        </aside>

        <!-- СРЕДНИЙ САЙДБАР: Список чатов -->
        <section id="chatsSidebar" class="w-80 lg:w-96 h-full flex flex-col border-r glass bg-white/70 dark:bg-slate-900/70 border-gray-200/60 dark:border-slate-700/50 z-10 shrink-0 chats-sidebar">
            <div class="p-4 border-b border-gray-200/60 dark:border-slate-700/50">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-semibold">Сообщения</h2>
                    <button class="md:hidden p-1" onclick="toggleSidebar()"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="mt-3 relative">
                    <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-gray-400"></i>
                    <input type="search" placeholder="Поиск..." class="w-full pl-9 pr-4 py-2.5 text-sm bg-gray-100/80 dark:bg-slate-800 border-none rounded-xl outline-none dark:text-white">
                </div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll" id="roomsList">
                <div onclick="switchRoom('Общий')" class="room-item px-3 py-2.5 mx-2 rounded-xl flex items-center gap-3 hover:bg-indigo-50 dark:hover:bg-slate-800 cursor-pointer bg-indigo-50 dark:bg-slate-800">
                    <div class="w-11 h-11 rounded-full bg-indigo-200 dark:bg-indigo-700 flex items-center justify-center font-bold">🌍</div>
                    <div class="flex-1"><span class="font-semibold">Общий чат</span><p class="text-sm text-gray-500">Основной чат</p></div>
                </div>
                <div onclick="switchRoom('Техподдержка')" class="room-item px-3 py-2.5 mx-2 rounded-xl flex items-center gap-3 hover:bg-indigo-50 dark:hover:bg-slate-800 cursor-pointer">
                    <div class="w-11 h-11 rounded-full bg-amber-200 dark:bg-amber-800 flex items-center justify-center font-bold">🔧</div>
                    <div class="flex-1"><span class="font-semibold">Тех. поддержка</span><p class="text-sm text-gray-500">Помощь</p></div>
                </div>
                <div onclick="switchRoom('Новости')" class="room-item px-3 py-2.5 mx-2 rounded-xl flex items-center gap-3 hover:bg-indigo-50 dark:hover:bg-slate-800 cursor-pointer">
                    <div class="w-11 h-11 rounded-full bg-sky-200 dark:bg-sky-800 flex items-center justify-center font-bold">📰</div>
                    <div class="flex-1"><span class="font-semibold">Новости</span><p class="text-sm text-gray-500">Обновления</p></div>
                </div>
                <div onclick="switchRoom('Нейросеть')" class="room-item px-3 py-2.5 mx-2 rounded-xl flex items-center gap-3 hover:bg-indigo-50 dark:hover:bg-slate-800 cursor-pointer">
                    <div class="w-11 h-11 rounded-full bg-purple-200 dark:bg-purple-800 flex items-center justify-center font-bold">🤖</div>
                    <div class="flex-1"><span class="font-semibold">Нейросеть</span><p class="text-sm text-gray-500">AI-помощник</p></div>
                </div>
            </div>
            <div class="p-3 border-t border-gray-200/60 dark:border-slate-700/50 cursor-pointer" onclick="openMyProfile()">
                <div class="flex items-center gap-3">
                    <img id="myAvSidebar" class="w-10 h-10 rounded-full" style="object-fit:cover;">
                    <span id="myNameSidebar" class="font-semibold text-sm">Загрузка...</span>
                </div>
            </div>
        </section>

        <!-- ГЛАВНАЯ ОБЛАСТЬ -->
        <main class="flex-1 flex flex-col h-full bg-gray-50/60 dark:bg-slate-950/70">
            <button class="md:hidden absolute top-3 left-3 z-30 p-2 bg-white dark:bg-slate-800 rounded-xl shadow" onclick="toggleSidebar()">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            
            <header class="h-16 flex items-center justify-between px-5 pl-14 md:pl-5 border-b glass bg-white/70 dark:bg-slate-900/70 shrink-0">
                <div class="flex items-center gap-3">
                    <h3 id="roomTitle" class="font-semibold text-lg"># Общий чат</h3>
                </div>
                <div class="relative flex items-center gap-2">
                    <button class="p-2 hover:bg-gray-200 dark:hover:bg-slate-700 rounded-full"><i data-lucide="phone" class="w-5 h-5"></i></button>
                    <button class="p-2 hover:bg-gray-200 dark:hover:bg-slate-700 rounded-full"><i data-lucide="video" class="w-5 h-5"></i></button>
                    <div class="relative">
                        <button id="dropdownTrigger" class="p-2 hover:bg-gray-200 dark:hover:bg-slate-700 rounded-full">
                            <i data-lucide="ellipsis-vertical" class="w-5 h-5"></i>
                        </button>
                        <div id="dropdownMenu" class="absolute right-0 top-12 w-48 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl shadow-xl dropdown-menu z-30 py-1.5">
                            <button onclick="alert('Поиск в чате')" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center gap-2">
                                <i data-lucide="search" class="w-4 h-4"></i>Поиск
                            </button>
                            <button onclick="alert('Настройки чата')" class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-100 dark:hover:bg-slate-700 flex items-center gap-2">
                                <i data-lucide="settings" class="w-4 h-4"></i>Настройки
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <div id="msgs" class="flex-1 overflow-y-auto custom-scroll px-4 py-6 space-y-5"></div>

            <div class="p-3 md:p-4 mx-3 mb-3 glass bg-white/80 dark:bg-slate-800/80 border border-gray-200/70 dark:border-slate-700/40 rounded-2xl shadow-lg flex items-center gap-2">
                <button class="p-2 text-gray-500"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                <input id="mInp" class="flex-1 bg-transparent border-none outline-none text-sm px-2 py-1 dark:text-white" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" class="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all"><i data-lucide="send" class="w-5 h-5"></i></button>
            </div>
        </main>
    </div>

    <!-- ПРОСМОТР ПРОФИЛЯ -->
    <div id="userProf" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-96 overflow-hidden shadow-2xl">
            <div class="h-24 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <div class="px-6 pb-6 -mt-10">
                <img id="v_av" class="w-20 h-20 rounded-2xl border-4 border-white dark:border-slate-800 object-cover">
                <h3 id="v_name" class="text-xl font-bold mt-2 dark:text-white"></h3>
                <p id="v_user" class="text-gray-500 text-sm"></p>
                <div class="mt-3 p-3 bg-gray-100 dark:bg-slate-700 rounded-xl">
                    <p class="text-xs text-gray-500 uppercase font-semibold mb-1">О себе</p>
                    <p id="v_bio" class="text-sm dark:text-white"></p>
                </div>
                <div id="v_btns" class="mt-3 flex gap-2"></div>
                <button onclick="closeProfile()" class="w-full mt-3 p-2 bg-gray-200 dark:bg-slate-700 rounded-xl dark:text-white">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- МОЙ ПРОФИЛЬ -->
    <div id="myProf" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl w-96 p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 dark:text-white">Настройки профиля</h3>
            <input id="p_av" class="w-full p-3 bg-gray-100 dark:bg-slate-700 border-none rounded-xl mb-3 outline-none dark:text-white" placeholder="Ссылка на фото">
            <input id="p_name" class="w-full p-3 bg-gray-100 dark:bg-slate-700 border-none rounded-xl mb-3 outline-none dark:text-white" placeholder="Ваше имя">
            <textarea id="p_bio" class="w-full p-3 bg-gray-100 dark:bg-slate-700 border-none rounded-xl mb-4 outline-none dark:text-white" placeholder="О себе" rows="3"></textarea>
            <button id="saveP" class="w-full p-3 bg-indigo-600 text-white rounded-xl font-semibold mb-2">Сохранить</button>
            <button onclick="closeMyProfile()" class="w-full p-2 bg-gray-200 dark:bg-slate-700 rounded-xl dark:text-white">Отмена</button>
        </div>
    </div>

    <script>
        const $ = s => document.querySelector(s), socket = io();
        let state = { me: null, room: 'Общий' };

        // Инициализация иконок
        lucide.createIcons();

        // Тема
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        });
        
        if (localStorage.getItem('theme') === 'light') document.body.classList.remove('dark');
        updateThemeIcon();
        
        function updateThemeIcon() {
            const sun = document.querySelector('#themeToggle [data-lucide="sun"]');
            const moon = document.querySelector('#themeToggle [data-lucide="moon"]');
            if (sun) sun.style.display = document.body.classList.contains('dark') ? 'block' : 'none';
            if (moon) moon.style.display = document.body.classList.contains('dark') ? 'none' : 'block';
        }

        // Dropdown
        document.getElementById('dropdownTrigger').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('dropdownMenu').classList.toggle('active');
        });
        document.addEventListener('click', () => document.getElementById('dropdownMenu').classList.remove('active'));

        // Мобильная боковая панель
        function toggleSidebar() {
            document.getElementById('chatsSidebar').classList.toggle('mobile-visible');
        }

        // Авторизация
        const login = (u, p) => {
            localStorage.setItem('cat_u', u);
            localStorage.setItem('cat_p', p);
            socket.emit('auth', { action: 'login', username: u, password: p });
        };

        document.getElementById('loginBtn').onclick = () => {
            login(document.getElementById('uInp').value, document.getElementById('pInp').value);
        };

        socket.on('auth_result', d => {
            if (d.success) {
                state.me = d.user;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                updateMyUI();
                socket.emit('join', { room: state.room });
            } else {
                alert(d.error || 'Ошибка входа');
            }
        });

        function updateMyUI() {
            if (!state.me) return;
            const av = state.me.avatar || `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${state.me.username}`;
            document.getElementById('myAvSmall').src = av;
            document.getElementById('myAvSidebar').src = av;
            document.getElementById('myNameSidebar').textContent = state.me.display_name;
        }

        // Переключение комнат
        function switchRoom(room) {
            state.room = room;
            document.getElementById('roomTitle').textContent = '# ' + room;
            document.getElementById('msgs').innerHTML = '';
            
            // Обновляем активную комнату в списке
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.remove('bg-indigo-50', 'dark:bg-slate-800');
                if (el.textContent.includes(room)) el.classList.add('bg-indigo-50', 'dark:bg-slate-800');
            });
            
            socket.emit('join', { room: room });
            if (window.innerWidth < 768) toggleSidebar();
        }

        // Отправка сообщений
        function sendMessage() {
            const text = document.getElementById('mInp').value.trim();
            if (text && state.me) {
                socket.emit('message', {
                    room: state.room,
                    text: text,
                    username: state.me.username
                });
                document.getElementById('mInp').value = '';
            }
        }

        // Получение сообщений
        socket.on('message', m => {
            const isMy = m.username === state.me?.username;
            const html = `
                <div class="flex items-start gap-3 ${isMy ? 'justify-end' : ''} msg-anim">
                    ${!isMy ? `<img src="${m.avatar || 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed='+m.username}" 
                         class="w-8 h-8 rounded-full cursor-pointer" onclick="viewProfile('${m.username}')">` : ''}
                    <div class="max-w-[75%]">
                        ${!isMy ? `<p class="text-xs text-gray-500 mb-1 cursor-pointer hover:text-indigo-500" onclick="viewProfile('${m.username}')">@${m.username}</p>` : ''}
                        <div class="p-3 rounded-2xl ${isMy ? 'bg-indigo-600 text-white message-bubble-me' : 'bg-white dark:bg-slate-800 message-bubble-other border border-gray-100 dark:border-slate-700'}">
                            <p class="text-sm">${m.text}</p>
                        </div>
                    </div>
                    ${isMy ? `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-xs font-bold text-white">Я</div>` : ''}
                </div>`;
            document.getElementById('msgs').insertAdjacentHTML('beforeend', html);
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });

        socket.on('history', msgs => {
            document.getElementById('msgs').innerHTML = '';
            msgs.forEach(m => {
                const isMy = m.username === state.me?.username;
                const html = `
                <div class="flex items-start gap-3 ${isMy ? 'justify-end' : ''}">
                    ${!isMy ? `<img src="${m.avatar || 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed='+m.username}" 
                         class="w-8 h-8 rounded-full cursor-pointer" onclick="viewProfile('${m.username}')">` : ''}
                    <div class="max-w-[75%]">
                        ${!isMy ? `<p class="text-xs text-gray-500 mb-1 cursor-pointer hover:text-indigo-500" onclick="viewProfile('${m.username}')">@${m.username}</p>` : ''}
                        <div class="p-3 rounded-2xl ${isMy ? 'bg-indigo-600 text-white message-bubble-me' : 'bg-white dark:bg-slate-800 message-bubble-other border border-gray-100 dark:border-slate-700'}">
                            <p class="text-sm">${m.text}</p>
                        </div>
                    </div>
                    ${isMy ? `<div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-xs font-bold text-white">Я</div>` : ''}
                </div>`;
                document.getElementById('msgs').insertAdjacentHTML('beforeend', html);
            });
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });

        // Профили
        function viewProfile(un) {
            socket.emit('get_user_profile', { username: un });
        }

        socket.on('user_profile', d => {
            const u = d.user;
            document.getElementById('v_av').src = u.avatar || `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${d.username}`;
            document.getElementById('v_name').textContent = u.display_name;
            document.getElementById('v_user').textContent = '@' + d.username;
            document.getElementById('v_bio').textContent = u.bio || 'Пользователь CAT Messenger';
            
            const btnsDiv = document.getElementById('v_btns');
            btnsDiv.innerHTML = '';
            if (d.username !== state.me?.username) {
                if (state.me?.friends?.includes(d.username)) {
                    btnsDiv.innerHTML = '<span class="text-green-500 text-sm">✅ В друзьях</span>';
                } else if (state.me?.requests?.includes(d.username)) {
                    btnsDiv.innerHTML = '<span class="text-yellow-500 text-sm">⏳ Заявка отправлена</span>';
                } else {
                    btnsDiv.innerHTML = `<button onclick="sendFriendRequest('${d.username}')" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm">Добавить в друзья</button>`;
                }
            }
            
            document.getElementById('userProf').classList.remove('hidden');
        });

        function closeProfile() {
            document.getElementById('userProf').classList.add('hidden');
        }

        function sendFriendRequest(un) {
            socket.emit('send_friend_request', { my_username: state.me.username, target_username: un });
            alert('Заявка отправлена!');
        }

        function openMyProfile() {
            document.getElementById('p_av').value = state.me.avatar || '';
            document.getElementById('p_name').value = state.me.display_name || '';
            document.getElementById('p_bio').value = state.me.bio || '';
            document.getElementById('myProf').classList.remove('hidden');
        }

        function closeMyProfile() {
            document.getElementById('myProf').classList.add('hidden');
        }

        document.getElementById('saveP').onclick = () => {
            socket.emit('update_profile', {
                username: state.me.username,
                display_name: document.getElementById('p_name').value,
                bio: document.getElementById('p_bio').value,
                avatar: document.getElementById('p_av').value
            });
            closeMyProfile();
        };

        socket.on('friend_request', d => {
            alert(`Пользователь @${d.from} хочет добавить вас в друзья!`);
        });

        // Автовход
        window.onload = () => {
            const u = localStorage.getItem('cat_u');
