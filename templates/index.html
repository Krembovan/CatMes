<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СКАМ ЧАТ</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f111a;
            --surface: #1a1d2e;
            --modal-bg: #1e2130;
            --primary: #7289da;
            --danger: #ff4747;
            --text: #ffffff;
            --text-secondary: #949ba4;
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Красивое модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: var(--modal-bg);
            width: 90%;
            max-width: 380px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .modal-box h3 { margin: 0 0 10px; font-size: 1.2rem; }
        .modal-box p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-wrapper input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--danger); }

        .modal-btns { display: flex; gap: 12px; }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cancel { background: #393e4d; color: white; }
        .btn-confirm { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Контекстное меню */
        #context-menu {
            display: none;
            position: fixed;
            background: var(--modal-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            min-width: 160px;
            z-index: 10000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .menu-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item.danger { color: var(--danger); }

        /* Остальные стили (кратко) */
        .sidebar { width: 300px; background: #0b0d14; border-right: 1px solid #2d314d; display: flex; flex-direction: column; }
        .room-item { position: relative; display: flex; align-items: center; gap: 12px; padding: 12px; margin: 5px 10px; border-radius: 12px; cursor: pointer; }
        .room-item.active { background: var(--primary); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .main { flex: 1; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 20px; background: var(--surface); display: flex; gap: 10px; }
        input { background: #0b0d14; border: 1px solid #2d314d; color: white; padding: 12px; border-radius: 10px; flex: 1; outline: none; }
    </style>
</head>
<body onclick="hideContextMenu()">

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Удалить чат?</h3>
            <p>Вы уверены? Это действие нельзя отменить.</p>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="delete-for-all">
                <span>Удалить для собеседника</span>
            </label>
            <div class="modal-btns">
                <button class="btn btn-cancel" onclick="closeDeleteModal()">ОТМЕНА</button>
                <button class="btn btn-confirm" onclick="confirmDelete()">УДАЛИТЬ</button>
            </div>
        </div>
    </div>

    <div id="context-menu">
        <div class="menu-item" onclick="execHide()">
            <i class="fas fa-eye-slash"></i> Скрыть чат
        </div>
        <div class="menu-item danger" onclick="openDeleteModal()">
            <i class="fas fa-trash"></i> Удалить историю
        </div>
    </div>

    <div class="sidebar">
        <div style="padding: 20px; font-weight: 600;">ЧАТЫ</div>
        <div id="rooms-list"></div>
    </div>

    <div class="main">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="msg" placeholder="Сообщение...">
            <button onclick="send()" class="btn btn-confirm" style="flex:none; width:50px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // 1. Сначала объявляем socket
        const socket = io();
        let myData = {};
        let currentRoom = 'Общий';
        let selectedRoomForMenu = null;

        // 2. Функции интерфейса
        function hideContextMenu() {
            document.getElementById('context-menu').style.display = 'none';
        }

        function showContextMenu(e, rid) {
            e.preventDefault();
            e.stopPropagation();
            selectedRoomForMenu = rid;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function openDeleteModal() {
            document.getElementById('delete-modal').style.display = 'flex';
            hideContextMenu();
        }

        function closeDeleteModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }

        // 3. Логика удаления
        function confirmDelete() {
            const deleteAll = document.getElementById('delete-for-all').checked;
            if (selectedRoomForMenu) {
                socket.emit('delete_chat', {
                    chat_id: selectedRoomForMenu,
                    delete_for_all: deleteAll,
                    my_nick: myData.display
                });
            }
            closeDeleteModal();
        }

        function execHide() {
            if (selectedRoomForMenu) {
                socket.emit('hide_chat', {
                    my_nick: myData.display,
                    room_id: selectedRoomForMenu
                });
            }
            hideContextMenu();
        }

        // 4. Слушатели сокетов
        socket.on('chat_deleted_globally', (data) => {
            if (currentRoom === data.chat_id) {
                document.getElementById('chat').innerHTML = '';
            }
            alert("Чат удален для всех участников");
            location.reload();
        });

        socket.on('chat_hidden_locally', () => {
            location.reload();
        });

        // Заглушка для теста (вставь свою логику авторизации)
        myData = { display: localStorage.getItem('skam_nick') || 'User' };
    </script>
</body>
</html>
