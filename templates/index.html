<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CAT">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#090c12">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=cat">
    <title>CAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #0d1117; --surface: #161b22; --primary: #7c5cfc; --primary-dark: #6a48e0; --accent: #38bdf8; --text: #e2e8f0; --text-secondary: #94a3b8; --border: rgba(255,255,255,0.06); --danger: #ef4444; --success: #10b981; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #090c12; color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-btns { display: flex; gap: 8px; }
        .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; position: relative; }
        .icon-btn:hover { background: var(--primary); border-color: var(--primary); }
        .badge-count { position: absolute; top: -6px; right: -6px; background: var(--danger); color: white; font-size: 0.6rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; display: none; }
        .badge-count.show { display: flex; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 15px; }
        .section-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); padding: 15px 12px 8px; }
        .chat-item, .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; color: var(--text-secondary); font-size: 0.9rem; }
        .chat-item:hover, .friend-item:hover { background: var(--surface); color: var(--text); }
        .chat-item.active { background: rgba(124,92,252,0.15); color: var(--text); }
        .chat-avatar { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; font-size: 0.9rem; overflow: hidden; }
        .badge-accept { background: var(--primary); color: white; border: none; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; font-weight: 600; margin-left: auto; }
        .friend-remove-btn { cursor: pointer; color: var(--text-secondary); font-size: 1rem; padding: 4px 8px; border-radius: 6px; }
        .friend-remove-btn:hover { color: var(--danger); background: rgba(239,68,68,0.1); }
        .profile-mini { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .avatar-mini { width: 38px; height: 38px; border-radius: 12px; object-fit: cover; background: var(--surface); }
        .profile-info { flex: 1; min-width: 0; }
        .profile-name { font-weight: 600; font-size: 0.9rem; }
        .profile-username { font-size: 0.75rem; color: var(--text-secondary); }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 18px 25px; border-bottom: 1px solid var(--border); font-weight: 600; background: rgba(13,17,23,0.8); display: flex; align-items: center; }
        .back-btn { display: none; cursor: pointer; margin-right: 12px; font-size: 1.3rem; color: var(--text-secondary); }
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; gap: 10px; max-width: 75%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; word-break: break-word; position: relative; }
        .msg:not(.my) .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
        .msg.my .msg-bubble { background: linear-gradient(135deg, var(--primary), #9b7cfc); color: white; border-bottom-right-radius: 6px; }
        .msg-author { font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; color: var(--accent); cursor: pointer; }
        .msg.my .msg-author { color: rgba(255,255,255,0.8); }
        .msg-delete-btn { cursor: pointer; font-size: 0.7rem; color: #ef4444; margin-left: 8px; opacity: 0; }
        .msg:hover .msg-delete-btn { opacity: 1; }
        /* Цитата (reply) */
        .msg-reply { background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); padding: 6px 10px; margin-bottom: 6px; border-radius: 6px; font-size: 0.78rem; color: var(--text-secondary); cursor: pointer; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .msg-reply-name { font-weight: 700; color: var(--accent); }
        .msg-reply-preview { opacity: 0.8; }
        /* Изображение в сообщении */
        .msg-image { max-width: 280px; max-height: 300px; border-radius: 12px; cursor: pointer; margin-top: 6px; transition: transform 0.2s; }
        .msg-image:hover { transform: scale(1.02); }
        /* Лайтбокс */
        .lightbox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; align-items: center; justify-content: center; cursor: pointer; }
        .lightbox-overlay.active { display: flex; }
        .lightbox-overlay img { max-width: 95vw; max-height: 95vh; border-radius: 16px; object-fit: contain; }
        /* Превью ответа (reply bar) */
        .reply-bar { display: none; padding: 10px 25px; background: var(--surface); border-top: 1px solid var(--border); align-items: center; gap: 12px; font-size: 0.8rem; }
        .reply-bar.show { display: flex; }
        .reply-bar-content { flex: 1; color: var(--text-secondary); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .reply-bar-cancel { cursor: pointer; color: var(--danger); font-weight: 700; font-size: 1.2rem; }
        /* Отправка файлов */
        .attach-btn { background: transparent; border: 1px solid var(--border); width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0; transition: 0.2s; }
        .attach-btn:hover { background: var(--surface); color: var(--text); }
        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); gap: 15px; }
        .empty-chat-icon { font-size: 4rem; opacity: 0.3; }
        .input-box { padding: 20px 25px; display: flex; gap: 12px; background: var(--bg); border-top: 1px solid var(--border); }
        .input-msg { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 14px 20px; border-radius: 30px; color: var(--text); font-size: 0.95rem; outline: none; }
        .btn-send { background: var(--primary); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; }
        .notif-overlay { position: fixed; top: 60px; right: 20px; width: 360px; max-height: 500px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); z-index: 200; display: none; overflow-y: auto; }
        .notif-overlay.open { display: block; }
        .notif-header { padding: 15px 20px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .notif-item { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .notif-text { font-size: 0.85rem; margin-bottom: 5px; }
        .notif-time { font-size: 0.7rem; color: var(--text-secondary); }
        .notif-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-sm { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .btn-sm.primary { background: var(--primary); color: white; }
        .btn-sm.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 35px; width: 420px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
        .modal h2 { text-align: center; margin-bottom: 25px; font-weight: 700; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.95rem; outline: none; }
        .input-group input:disabled { opacity: 0.5; }
        .btn { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: 600; font-size: 1rem; cursor: pointer; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .modal-switch { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary); }
        .modal-switch a { color: var(--accent); cursor: pointer; font-weight: 600; }
        .error-text { color: var(--danger); font-size: 0.8rem; min-height: 20px; }
        .avatar-large { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; display: block; margin: 0 auto 20px; border: 3px solid var(--primary); }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px); background: var(--surface); border: 1px solid var(--border); padding: 15px 25px; border-radius: 14px; z-index: 3000; transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--accent); }
        @media (max-width: 480px) { .sidebar { width: 100%; position: absolute; left: 0; top: 0; height: 100vh; z-index: 20; } .sidebar.hidden { display: none; } .chat-area { width: 100%; } .back-btn { display: block; } .notif-overlay { width: 95vw; right: 2.5vw; } .msg-image { max-width: 200px; max-height: 200px; } }
    </style>
</head>
<body>

<!-- Auth Modal -->
<div id="authOverlay" class="modal-overlay active">
    <div class="modal">
        <h2>😸 <span style="background:linear-gradient(135deg,#7c5cfc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">CAT</span></h2>
        <div id="authError" class="error-text" style="text-align:center;margin-bottom:15px;"></div>
        <div id="loginForm">
            <div class="input-group"><label>Username</label><input type="text" id="loginUser" placeholder="@username" autocomplete="username"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="loginPass" placeholder="••••" autocomplete="current-password"></div>
            <button class="btn btn-primary" onclick="handleLogin()">Войти</button>
            <div class="modal-switch">Нет аккаунта? <a onclick="switchAuth('register')">Создать</a></div>
        </div>
        <div id="registerForm" style="display:none;">
            <div class="input-group"><label>Username</label><input type="text" id="regUser" placeholder="@username" value="@" oninput="if(!this.value.startsWith('@')) this.value = '@' + this.value.replace(/@/g, '');" autocomplete="username"></div>
            <div class="input-group"><label>Имя (Ник)</label><input type="text" id="regName" placeholder="Ваше имя" autocomplete="name"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="regPass" placeholder="минимум 4 символа" autocomplete="new-password"></div>
            <div class="input-group"><label>Повторите пароль</label><input type="password" id="regPass2" placeholder="повторите пароль" autocomplete="new-password"></div>
            <div id="regError" class="error-text"></div>
            <button class="btn btn-primary" onclick="handleRegister()">Зарегистрироваться</button>
            <div class="modal-switch">Уже есть аккаунт? <a onclick="switchAuth('login')">Войти</a></div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div id="profileOverlay" class="modal-overlay">
    <div class="modal">
        <h2>👤 Профиль</h2>
        <img id="profileAvatar" class="avatar-large" src="" alt="Аватар">
        <div class="input-group"><label>Имя</label><input type="text" id="profileName"></div>
        <div class="input-group"><label>Username</label><input type="text" id="profileUser" disabled></div>
        <div class="input-group"><label>Описание</label><textarea id="profileBio"></textarea></div>
        <div class="input-group"><label>URL Аватара</label><input type="text" id="profileAvatarUrl"></div>
        <button class="btn btn-primary" onclick="saveProfile()">💾 Сохранить</button>
        <button class="btn btn-secondary" onclick="closeModal('profileOverlay')">Отмена</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Выйти</button>
    </div>
</div>

<!-- Add Friend Modal -->
<div id="friendOverlay" class="modal-overlay">
    <div class="modal">
        <h2>🔍 Найти друга</h2>
        <div class="input-group"><label>Username</label><input type="text" id="searchUser" placeholder="@username" onfocus="if(this.value=='')this.value='@';" oninput="if(!this.value.startsWith('@'))this.value='@'+this.value.replace('@','');"></div>
        <div id="friendError" class="error-text"></div>
        <button class="btn btn-primary" onclick="sendFriendReq()">📨 Отправить запрос</button>
        <button class="btn btn-secondary" onclick="closeModal('friendOverlay')">Отмена</button>
    </div>
</div>

<!-- User Profile Modal (dynamic content) -->
<div id="userProfileOverlay" class="modal-overlay">
    <div class="modal" id="userProfileContent"></div>
</div>

<!-- Lightbox для изображений -->
<div id="lightboxOverlay" class="lightbox-overlay" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Изображение">
</div>

<!-- Notifications Panel -->
<div class="notif-overlay" id="notifPanel">
    <div class="notif-header">
        <span>🔔 Уведомления</span>
        <span style="cursor:pointer" onclick="document.getElementById('notifPanel').classList.remove('open')">✕</span>
    </div>
    <div id="notifList"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Main App -->
<div class="app-container" id="mainApp" style="display:none;">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">CAT</span>
            <div class="header-btns">
                <div class="icon-btn" onclick="toggleNotifPanel()">🔔<span class="badge-count" id="notifBadge"></span></div>
                <div class="icon-btn" onclick="openFriendModal()">+</div>
                <div class="icon-btn" onclick="openModal('profileOverlay');loadProfile();">👤</div>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="section-label">💬 Каналы</div>
            <div id="roomList"></div>
            <div class="section-label">👥 Друзья</div>
            <div id="friendList"></div>
        </div>
        <div class="profile-mini" onclick="openModal('profileOverlay');loadProfile();">
            <img id="myAvatar" class="avatar-mini" src="" alt="Аватар">
            <div class="profile-info">
                <div class="profile-name" id="myName">—</div>
                <div class="profile-username" id="myUsername">@—</div>
                <div id="myRole" style="font-size:0.7rem; color: #f59e0b; margin-top: 2px;"></div>
            </div>
        </div>
    </div>
    <div class="chat-area">
        <div class="chat-header">
            <span class="back-btn" onclick="goBack()">←</span>
            <span id="chatHeader">CAT</span>
        </div>
        <div id="messages">
            <div class="empty-chat">
                <div class="empty-chat-icon">🐱</div>
                <div style="font-size:1.2rem;font-weight:600;color:var(--text);">Добро пожаловать в CAT</div>
                <div style="font-size:0.85rem;color:var(--text-secondary);">Выберите чат или начните диалог</div>
            </div>
        </div>
        <!-- Бар ответа (reply) -->
        <div class="reply-bar" id="replyBar">
            <span>↩</span>
            <div class="reply-bar-content" id="replyBarText"></div>
            <span class="reply-bar-cancel" onclick="cancelReply()">✕</span>
        </div>
        <!-- Инпут -->
        <div class="input-box">
            <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Прикрепить изображение">📎</button>
            <input type="text" class="input-msg" id="msgInput" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')sendMsg()">
            <button class="btn-send" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// ГЛОБАЛЬНОЕ СОСТОЯНИЕ
// ============================================================
const socket = io();
let myData = null;
let currentRoom = 'Общий';
let notifications = [];
let dmUser = null;
let replyTo = null; // ID сообщения, на которое отвечаем

// ============================================================
// БЕЗОПАСНОЕ ЭКРАНИРОВАНИЕ (полное покрытие)
// ============================================================
const ESC_MAP = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;',
    '`': '&#096;'
};

function escapeHtml(str) {
    if (!str && str !== 0) return '';
    return String(str).replace(/[&<>"'`]/g, function(ch) { return ESC_MAP[ch]; });
}

// ============================================================
// САНИТИЗАЦИЯ URL (защита от javascript: протокола)
// ============================================================
function sanitizeUrl(url) {
    if (!url) return '';
    url = url.trim();
    const lower = url.toLowerCase();
    if (lower.startsWith('javascript:') || lower.startsWith('data:') && !lower.startsWith('data:image/')) {
        return '';
    }
    return url;
}

function safeAvatarUrl(url, fallbackSeed) {
    const sanitized = sanitizeUrl(url);
    if (sanitized && (sanitized.startsWith('http://') || sanitized.startsWith('https://') || sanitized.startsWith('data:image/'))) {
        return sanitized;
    }
    return 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=' + encodeURIComponent(fallbackSeed || 'cat');
}

// ============================================================
// УТИЛИТЫ ИНТЕРФЕЙСА
// ============================================================
function showToast(msg, type) {
    type = type || 'success';
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type + ' show';
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function openModal(id) {
    document.getElementById(id).classList.add('active');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

function switchAuth(mode) {
    document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('authError').textContent = '';
    document.getElementById('regError').textContent = '';
}

// ============================================================
// ЛАЙТБОКС ДЛЯ ИЗОБРАЖЕНИЙ
// ============================================================
function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxOverlay').classList.add('active');
}

function closeLightbox() {
    document.getElementById('lightboxOverlay').classList.remove('active');
}

// ============================================================
// ОТПРАВКА ФАЙЛОВ (ИЗОБРАЖЕНИЯ)
// ============================================================
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
        showToast('Только изображения', 'error');
        return;
    }
    if (file.size > 5 * 1024 * 1024) {
        showToast('Максимум 5 МБ', 'error');
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64 = e.target.result;
        if (!myData) return;
        socket.emit('message', {
            room: currentRoom,
            text: '',
            image: base64,  // base64-строка изображения
            user: myData.display_name,
            username: myData.username,
            avatar: myData.avatar
        });
        showToast('Изображение отправлено', 'success');
    };
    reader.readAsDataURL(file);
    event.target.value = ''; // Сброс input
}

// ============================================================
// АВТО-ВХОД ИЗ LOCALSTORAGE
// ============================================================
const savedUser = localStorage.getItem('cat_user');
const savedPass = localStorage.getItem('cat_pass');
if (savedUser && savedPass) {
    socket.emit('auth', { action: 'login', username: savedUser, password: savedPass });
}

// ============================================================
// АВТОРИЗАЦИЯ
// ============================================================
function handleLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    document.getElementById('authError').textContent = '';
    if (!u || !p) {
        document.getElementById('authError').textContent = 'Заполните все поля';
        return;
    }
    socket.emit('auth', { action: 'login', username: u, password: p });
}

function handleRegister() {
    const u = document.getElementById('regUser').value.trim();
    const n = document.getElementById('regName').value.trim();
    const p = document.getElementById('regPass').value;
    const p2 = document.getElementById('regPass2').value;
    const e = document.getElementById('regError');
    e.textContent = '';
    if (!u || !n || !p || !p2) {
        e.textContent = 'Заполните все поля';
        return;
    }
    if (u.length < 3) {
        e.textContent = 'Логин: минимум 3 символа';
        return;
    }
    if (p.length < 4) {
        e.textContent = 'Пароль: минимум 4 символа';
        return;
    }
    if (p !== p2) {
        e.textContent = 'Пароли не совпадают';
        return;
    }
    socket.emit('auth', { action: 'register', username: u, display_name: n, password: p, password2: p2 });
}

socket.on('auth_result', function(data) {
    if (data.success) {
        myData = data.user;
        localStorage.setItem('cat_user', myData.username);
        localStorage.setItem('cat_pass', document.getElementById('loginPass').value || savedPass || '');
        notifications = myData.notifications || [];
        document.getElementById('authOverlay').classList.remove('active');
        document.getElementById('mainApp').style.display = 'flex';
        updateMyInfo();
        updateBadge();
        updateFriendList();
        updateRoomList();
        // НЕ переключаем на общий канал — показываем приветственный экран
        document.getElementById('messages').innerHTML = `
            <div class="empty-chat">
                <div class="empty-chat-icon">🐱</div>
                <div style="font-size:1.2rem;font-weight:600;color:var(--text);">Добро пожаловать в CAT</div>
                <div style="font-size:0.85rem;color:var(--text-secondary);">Выберите чат или начните диалог</div>
            </div>`;
        document.getElementById('chatHeader').textContent = 'CAT';
        currentRoom = null;
    } else {
        if (document.getElementById('registerForm').style.display === 'block') {
            document.getElementById('regError').textContent = data.error;
        } else {
            document.getElementById('authError').textContent = data.error;
        }
    }
});

// ПРОФИЛЬ
// ============================================================
function updateMyInfo() {
    if (!myData) return;
    document.getElementById('myName').textContent = myData.display_name;
    document.getElementById('myUsername').textContent = '@' + myData.username;
    document.getElementById('myAvatar').src = safeAvatarUrl(myData.avatar, myData.username);
    const r = document.getElementById('myRole');
    const roles = {'owner': '👑 Владелец', 'admin': '🛡️ Админ', 'moderator': '🛡️ Модер', 'user': '👤 Пользователь'};
    if (r) r.textContent = roles[myData.role] || '';
}

function loadProfile() {
    if (!myData) return;
    document.getElementById('profileName').value = myData.display_name;
    document.getElementById('profileUser').value = '@' + myData.username;
    document.getElementById('profileBio').value = myData.bio || '';
    document.getElementById('profileAvatarUrl').value = myData.avatar || '';
    document.getElementById('profileAvatar').src = safeAvatarUrl(myData.avatar, myData.username);
}

function saveProfile() {
    const n = document.getElementById('profileName').value.trim();
    const b = document.getElementById('profileBio').value.trim();
    const a = document.getElementById('profileAvatarUrl').value.trim();
    if (!n) {
        showToast('Имя обязательно', 'error');
        return;
    }
    socket.emit('update_profile', { username: myData.username, display_name: n, bio: b, avatar: sanitizeUrl(a) });
}

socket.on('profile_updated', function(data) {
    myData = data.user;
    updateMyInfo();
    showToast('Профиль обновлён!', 'success');
    closeModal('profileOverlay');
});

function logout() {
    localStorage.removeItem('cat_user');
    localStorage.removeItem('cat_pass');
    myData = null;
    dmUser = null;
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('authOverlay').classList.add('active');
    document.getElementById('messages').innerHTML = `
        <div class="empty-chat">
            <div class="empty-chat-icon">🐱</div>
            <div style="font-size:1.2rem;font-weight:600;color:var(--text);">Добро пожаловать в CAT</div>
            <div style="font-size:0.85rem;color:var(--text-secondary);">Выберите чат или начните диалог</div>
        </div>`;
    closeModal('profileOverlay');
}

// ============================================================
// УВЕДОМЛЕНИЯ
// ============================================================
function toggleNotifPanel() {
    const p = document.getElementById('notifPanel');
    p.classList.toggle('open');
    if (p.classList.contains('open')) renderNotifications();
}

function updateBadge() {
    const total = (myData && myData.requests ? myData.requests.length : 0) +
        notifications.filter(function(n) { return !n.read; }).length;
    const b = document.getElementById('notifBadge');
    b.textContent = total;
    if (total > 0) {
        b.classList.add('show');
    } else {
        b.classList.remove('show');
    }
}

function renderNotifications() {
    const l = document.getElementById('notifList');
    l.innerHTML = '';

    const requests = (myData && myData.requests || []).map(function(u) {
        return {
            type: 'friend_request',
            from: u,
            text: '@' + u + ' хочет добавить вас в друзья',
            timestamp: Date.now() / 1000
        };
    });

    const all = requests.concat(notifications);

    if (all.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:30px;text-align:center;color:var(--text-secondary);';
        empty.textContent = 'Нет уведомлений';
        l.appendChild(empty);
        return;
    }

    all.forEach(function(n) {
        const item = document.createElement('div');
        item.className = 'notif-item';

        const textDiv = document.createElement('div');
        textDiv.className = 'notif-text';

        let notifText;
        if (n.type === 'new_message') {
            notifText = '💬 @' + n.from + ': ' + (n.text || '');
        } else if (n.type === 'friend_request') {
            notifText = n.text || ('@' + n.from + ' хочет добавить вас в друзья');
        } else {
            notifText = n.text || '';
        }
        textDiv.textContent = notifText;
        item.appendChild(textDiv);

        const timeDiv = document.createElement('div');
        timeDiv.className = 'notif-time';
        timeDiv.textContent = new Date(n.timestamp * 1000).toLocaleString();
        item.appendChild(timeDiv);

        if (n.type === 'new_message') {
            item.style.cursor = 'pointer';
            item.addEventListener('click', function() {
                if (n.from) startDM(n.from);
                toggleNotifPanel();
            });
        }

        if (n.type === 'friend_request') {
            const actions = document.createElement('div');
            actions.className = 'notif-actions';

            const acceptBtn = document.createElement('button');
            acceptBtn.className = 'btn-sm primary';
            acceptBtn.textContent = '✓ Принять';
            acceptBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                acceptFriend(n.from);
                toggleNotifPanel();
            });

            const declineBtn = document.createElement('button');
            declineBtn.className = 'btn-sm danger';
            declineBtn.textContent = '✕ Отклонить';
            declineBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                declineFriend(n.from);
                toggleNotifPanel();
            });

            actions.appendChild(acceptBtn);
            actions.appendChild(declineBtn);
            item.appendChild(actions);
        }

        l.appendChild(item);
    });
}

socket.on('new_notification', function(n) {
    notifications.unshift(n);
    updateBadge();
    showToast(n.text || '', 'info');
});

// ДРУЗЬЯ
// ============================================================
function updateFriendList() {
    if (!myData) return;
    updateBadge();
    const l = document.getElementById('friendList');
    l.innerHTML = '';

    (myData.requests || []).forEach(function(u) {
        const item = document.createElement('div');
        item.className = 'friend-item';
        item.style.border = '1px dashed var(--primary)';

        const avatar = document.createElement('div');
        avatar.className = 'chat-avatar';
        avatar.textContent = '👤';

        const span = document.createElement('span');
        span.style.flex = '1';
        span.textContent = '@' + u;

        const btn = document.createElement('button');
        btn.className = 'badge-accept';
        btn.textContent = '✓ Принять';
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            acceptFriend(u);
        });

        item.appendChild(avatar);
        item.appendChild(span);
        item.appendChild(btn);
        l.appendChild(item);
    });

    (myData.friends || []).forEach(function(u) {
        const item = document.createElement('div');
        item.className = 'friend-item';

        const img = document.createElement('img');
        img.className = 'chat-avatar friend-avatar-' + u;
        img.style.cssText = 'object-fit:cover;border-radius:12px;width:38px;height:38px;';
        img.src = 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=' + encodeURIComponent(u);
        img.alt = '';
        img.addEventListener('click', function(e) {
            e.stopPropagation();
            viewProfile(u);
        });
        img.addEventListener('error', function() {
            this.style.display = 'none';
        });

        const fallbackAv = document.createElement('div');
        fallbackAv.className = 'chat-avatar';
        fallbackAv.style.display = 'none';
        fallbackAv.textContent = '🔵';

        const nameSpan = document.createElement('span');
        nameSpan.style.flex = '1';
        nameSpan.style.cursor = 'pointer';
        nameSpan.addEventListener('click', function() { startDM(u); });

        const nameStrong = document.createElement('span');
        nameStrong.style.fontWeight = '600';
        nameStrong.textContent = '@' + u;

        const statusSpan = document.createElement('span');
        statusSpan.id = 'status_' + u;
        statusSpan.style.cssText = 'display:block;font-size:0.65rem;color:var(--text-secondary);';

        nameSpan.appendChild(nameStrong);
        nameSpan.appendChild(statusSpan);

        const removeBtn = document.createElement('span');
        removeBtn.className = 'friend-remove-btn';
        removeBtn.textContent = '✕';
        removeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            removeFriend(u);
        });

        item.appendChild(img);
        item.appendChild(fallbackAv);
        item.appendChild(nameSpan);
        item.appendChild(removeBtn);
        l.appendChild(item);

        socket.emit('get_avatar', { username: u });
        socket.emit('check_status', { username: u });
    });

    if (l.children.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:10px;color:var(--text-secondary);font-size:0.8rem;';
        empty.textContent = 'Нет друзей';
        l.appendChild(empty);
    }
}

function declineFriend(u) { socket.emit('decline_friend', { my_username: myData.username, target_username: u }); }

function removeFriend(u) {
    if (!confirm('Удалить @' + u + ' из друзей?')) return;
    socket.emit('remove_friend', { my_username: myData.username, target_username: u });
}

function viewProfile(u) {
    if (u === myData.username) { openModal('profileOverlay'); loadProfile(); return; }
    socket.emit('get_user_profile', { username: u, requester: myData.username });
}

// ============================================================
// ПЕРЕКЛЮЧЕНИЕ КОМНАТ
// ============================================================
function startDM(u) {
    dmUser = u;
    const sorted = [myData.username, u].sort();
    switchRoom('dm_' + sorted[0] + '_' + sorted[1]);
}

function switchRoom(r) {
    currentRoom = r;
    document.getElementById('messages').innerHTML = '';
    replyTo = null;
    cancelReply();

    if (r === 'Общий') {
        document.getElementById('chatHeader').textContent = '# Общий канал';
        dmUser = null;
    } else if (r.startsWith('dm_')) {
        document.getElementById('chatHeader').textContent = dmUser ? '💬 @' + dmUser : '💬 Личные сообщения';
    }

    const items = document.querySelectorAll('.chat-item');
    for (let i = 0; i < items.length; i++) {
        items[i].classList.toggle('active', items[i].getAttribute('data-room') === r);
    }

    socket.emit('join', { room: r });

    if (r.startsWith('dm_')) {
        socket.emit('mark_read', { room: r, username: myData.username });
    }

    if (window.innerWidth <= 480) {
        document.getElementById('sidebar').classList.add('hidden');
    }

    if (r.startsWith('dm_') && dmUser) {
        notifications = notifications.filter(function(n) { return n.from !== dmUser; });
        updateBadge();
    }
}

function goBack() {
    document.getElementById('sidebar').classList.remove('hidden');
}

// ============================================================
// ОТВЕТ НА СООБЩЕНИЕ (REPLY)
// ============================================================
function replyToMessage(msgId, author, preview) {
    replyTo = msgId;
    document.getElementById('replyBarText').textContent = '↩ ' + author + ': ' + preview;
    document.getElementById('replyBar').classList.add('show');
    document.getElementById('msgInput').focus();
}

function cancelReply() {
    replyTo = null;
    document.getElementById('replyBar').classList.remove('show');
    document.getElementById('replyBarText').textContent = '';
}

// ============================================================
// СООБЩЕНИЯ
// ============================================================
function sendMsg() {
    const i = document.getElementById('msgInput');
    const t = i.value.trim();
    if (!myData) return;
    if (!t) return;

    const msgData = {
        room: currentRoom,
        text: t,
        user: myData.display_name,
        username: myData.username,
        avatar: myData.avatar
    };

    // Добавляем reply_to если отвечаем
    if (replyTo) {
        msgData.reply_to = replyTo;
        cancelReply();
    }

    socket.emit('message', msgData);
    i.value = '';
}

function deleteMessage(msgId) {
    if (!confirm('Удалить сообщение?')) return;
    socket.emit('delete_message', { msg_id: msgId, username: myData.username });
}

function getAllMessages() {
    // Возвращает массив всех сообщений из DOM
    const msgs = [];
    const msgElements = document.querySelectorAll('.msg');
    msgElements.forEach(function(el) {
        msgs.push({
            id: el.getAttribute('data-msg-id'),
            username: el.getAttribute('data-username'),
            user: el.getAttribute('data-user'),
            text: el.getAttribute('data-text') || ''
        });
    });
    return msgs;
}

function renderMessage(m) {
    const b = document.getElementById('messages');
    if (b.querySelector('.empty-chat')) b.innerHTML = '';

    const isMy = m.username === (myData ? myData.username : '');
    const canDel = myData && (myData.role === 'owner' || myData.role === 'admin' || myData.role === 'moderator');
    const hasImage = m.image && m.image.startsWith('data:image/');
    const hasReply = m.reply_to && !m.image; // reply_to - ID сообщения, на которое отвечаем

    // Контейнер сообщения
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg' + (isMy ? ' my' : '');
    msgDiv.setAttribute('data-msg-id', m.id || m.timestamp || '');
    msgDiv.setAttribute('data-username', m.username || '');
    msgDiv.setAttribute('data-user', m.user || '');
    msgDiv.setAttribute('data-text', m.text || '');

    // Аватар
    const avatarUrl = safeAvatarUrl(m.avatar, m.username);
    const fallbackAvUrl = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(m.username) + '&background=7c5cfc&color=fff&size=40';
    const avImg = document.createElement('img');
    avImg.className = 'msg-avatar';
    avImg.src = avatarUrl;
    avImg.alt = '';
    avImg.style.cursor = 'pointer';
    avImg.title = 'Посмотреть профиль';
    avImg.addEventListener('click', function() { viewProfile(m.username); });
    avImg.addEventListener('error', function() { this.src = fallbackAvUrl; });
    msgDiv.appendChild(avImg);

    // Пузырь сообщения
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    // Автор (только для чужих сообщений)
    if (!isMy) {
        const author = document.createElement('div');
        author.className = 'msg-author';
        author.style.cursor = 'pointer';
        author.title = 'Посмотреть профиль';
        author.textContent = m.user || m.username;
        author.addEventListener('click', function() { viewProfile(m.username); });
        bubble.appendChild(author);
    }

    // Цитата (reply)
    if (hasReply) {
        const replyDiv = document.createElement('div');
        replyDiv.className = 'msg-reply';

        const replyName = document.createElement('span');
        replyName.className = 'msg-reply-name';
        replyName.textContent = '↩ ' + (m.reply_author || 'Сообщение');

        const replyPreview = document.createElement('span');
        replyPreview.className = 'msg-reply-preview';
        replyPreview.textContent = ': ' + (m.reply_text || '').substring(0, 50);

        replyDiv.appendChild(replyName);
        replyDiv.appendChild(replyPreview);

        // Клик по цитате скроллит к оригинальному сообщению
        replyDiv.addEventListener('click', function(e) {
            e.stopPropagation();
            const origMsg = document.querySelector('[data-msg-id="' + escapeHtml(m.reply_to) + '"]');
            if (origMsg) {
                origMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                origMsg.style.boxShadow = '0 0 20px var(--primary)';
                setTimeout(function() { origMsg.style.boxShadow = ''; }, 1500);
            }
        });

        bubble.appendChild(replyDiv);
    }

    // Текст (только если не изображение)
    if (m.text && !hasImage) {
        const textNode = document.createTextNode(m.text);
        bubble.appendChild(textNode);
    }

    // Изображение
    if (hasImage) {
        const img = document.createElement('img');
        img.className = 'msg-image';
        img.src = sanitizeUrl(m.image);
        img.alt = 'Изображение';
        img.loading = 'lazy';
        img.addEventListener('click', function(e) {
            e.stopPropagation();
            openLightbox(sanitizeUrl(m.image));
        });
        bubble.appendChild(img);

        // Если есть и текст и изображение — текст перед картинкой
        if (m.text) {
            const textDiv = document.createElement('div');
            textDiv.style.marginBottom = '6px';
            textDiv.textContent = m.text;
            bubble.insertBefore(textDiv, img);
        }
    }

    // Время отправки
    const timeSpan = document.createElement('span');
    timeSpan.style.cssText = 'font-size:0.7rem;opacity:0.7;margin-left:6px;white-space:nowrap;';
    timeSpan.textContent = formatMsgTime(m.timestamp);
    bubble.appendChild(timeSpan);

    // Кнопка ответа (reply) — показывается всегда при наведении
    const replyBtn = document.createElement('span');
    replyBtn.style.cssText = 'cursor:pointer;font-size:0.7rem;opacity:0;margin-left:8px;transition:opacity 0.2s;';
    replyBtn.textContent = '↩';
    replyBtn.title = 'Ответить';
    replyBtn.addEventListener('mouseenter', function() { this.style.opacity = '1'; });
    replyBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        const preview = (m.text || (m.image ? '[Изображение]' : '')).substring(0, 50);
        replyToMessage(m.id || m.timestamp, m.user || m.username, preview);
    });
    bubble.appendChild(replyBtn);

    // Кнопка удаления
    if (canDel) {
        const delBtn = document.createElement('span');
        delBtn.className = 'msg-delete-btn';
        delBtn.textContent = '✕';
        delBtn.title = 'Удалить';
        delBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            deleteMessage(m.id || m.timestamp);
        });
        bubble.appendChild(document.createTextNode(' '));
        bubble.appendChild(delBtn);
    }

    msgDiv.appendChild(bubble);
    b.appendChild(msgDiv);
    b.scrollTop = b.scrollHeight;
}

// ============================================================
// СОБЫТИЯ SOCKET
// ============================================================
function normalizeRoom(room) {
    if (!room) return '';
    if (room.startsWith('dm_')) {
        const parts = room.split('_');
        if (parts.length >= 3) {
            const s = [parts[1], parts[2]].sort();
            return 'dm_' + s[0] + '_' + s[1];
        }
    }
    return room;
}

socket.on('message', function(m) {
    const mr = normalizeRoom(m.room || '');
    const myR = normalizeRoom(currentRoom || '');
    if (mr === myR) renderMessage(m);
});

socket.on('history', function(h) {
    document.getElementById('messages').innerHTML = '';
    if (!h || h.length === 0) {
        document.getElementById('messages').innerHTML = '<div class="empty-chat"><div class="empty-chat-icon">💬</div><div>Нет сообщений</div></div>';
    } else {
        for (let i = 0; i < h.length; i++) renderMessage(h[i]);
    }
});

socket.on('message_deleted', function() {
    socket.emit('join', { room: currentRoom });
});

// Обработчик messages_read — обновлён для проверки структуры данных
socket.on('messages_read', function(data) {
    socket.emit('join', { room: currentRoom });

// ============================================================
// УТИЛИТА: ВРЕМЯ
// ============================================================
function formatMsgTime(ts) {
    if (!ts) return '';
    const d = new Date(ts * 1000);
    const now = new Date();
    const h = d.getHours().toString().padStart(2, '0');
    const m = d.getMinutes().toString().padStart(2, '0');
    const time = h + ':' + m;

    if (d.toDateString() === now.toDateString()) {
        return time;
    }

    const yesterday = new Date(now);
    yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) {
        return 'вчера ' + time;
    }

    if (d.getFullYear() === now.getFullYear()) {
        const day = d.getDate().toString().padStart(2, '0');
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        return day + '.' + month + ' ' + time;
    }

    const day = d.getDate().toString().padStart(2, '0');
    const month = (d.getMonth() + 1).toString().padStart(2, '0');
    const year = d.getFullYear();
    return day + '.' + month + '.' + year + ' ' + time;
}

function timeAgo(d) {
    const s = Math.floor((new Date() - d) / 1000);
    if (s < 60) return 'только что';
    if (s < 3600) return Math.floor(s / 60) + ' мин назад';
    if (s < 86400) return Math.floor(s / 3600) + ' ч назад';
    return Math.floor(s / 86400) + ' дн назад';
}

// ============================================================
// WEBRTC ЗВОНКИ
// ============================================================
let localStream = null, peerConnection = null, currentCallUser = null;
const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

async function startCall(u) {
    currentCallUser = u;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

        peerConnection.onicecandidate = (e) => {
            if (e.candidate) socket.emit('call_signal', { to: u, ice: e.candidate });
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit('call_user', { to: u, sdp: offer });
        showToast('📞 Звоним @' + u, 'info');
    } catch (e) {
        showToast('Ошибка микрофона', 'error');
    }
}

socket.on('incoming_call', async (d) => {
    if (confirm('📞 @' + d.from + ' звонит! Принять?')) {
        currentCallUser = d.from;
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));

        peerConnection.onicecandidate = (e) => {
            if (e.candidate) socket.emit('call_signal', { to: d.from, ice: e.candidate });
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('call_accepted', { to: d.from, sdp: answer });
    } else {
        socket.emit('call_rejected', { to: d.from });
    }
});

socket.on('call_accepted', async (d) => {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp));
    showToast('📞 Соединение установлено!', 'success');
});

socket.on('call_signal', (d) => {
    if (d.ice) peerConnection.addIceCandidate(new RTCIceCandidate(d.ice));
});

function hangUp() {
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    currentCallUser = null;
}
