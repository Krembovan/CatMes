<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAM CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f111a; --surface: #1e212b; --primary: #ff4747; --text: #ffffff; --border: rgba(255,255,255,0.05); }
        
        /* Исправляем высоту body, чтобы контент не схлопывался */
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            height: 100vh; /* Растягиваем на всю высоту */
            width: 100vw;
        }

        /* Главный контейнер мессенджера */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Боковая панель с чатами */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
        }

        .room-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid var(--border);
        }

        .room-item:hover {
            background: rgba(255,255,255,0.03);
        }

        /* Основная зона чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-area {
            padding: 20px;
            background: var(--surface);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        /* Твои модальные окна */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-card { 
            background: var(--surface); padding: 35px; border-radius: 24px; 
            width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border);
        }
        .btn-row { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-gray { background: #3e4147; color: white; }
        .btn-red { background: var(--primary); color: white; }

        /* Контекстное меню */
        #ctx-menu { 
            display: none; position: fixed; background: #181922; 
            border-radius: 12px; padding: 8px; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #ff5c5c; }
    </style>
</head>
<body onclick="closeAllMenus()">

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">SCAM CHAT</div>
            <div id="room-list">
                <div class="room-item" oncontextmenu="onRoomContextMenu(event, 'Общий')">
                    # Общий чат
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages">
                <div style="color: #949ba4; font-size: 0.9rem;">Добро пожаловать. Нажмите ПКМ на чат слева, чтобы вызвать меню удаления.</div>
            </div>
            <div class="input-area">
                <input type="text" placeholder="Написать сообщение...">
                <button class="btn btn-red" style="flex: 0; width: auto; padding: 10px 20px;">Send</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2>Удалить чат?</h2>
            <p>Вы уверены? История переписки исчезнет навсегда.</p>
            <label style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; cursor: pointer;">
                <input type="checkbox" id="delete-for-all-cb" style="width: 18px; height: 18px;">
                <span>Удалить для собеседника</span>
            </label>
            <div class="btn-row">
                <button class="btn btn-gray" onclick="closeModal()">ОТМЕНА</button>
                <button class="btn btn-red" onclick="confirmDelete()">УДАЛИТЬ</button>
            </div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="openModal()">🗑️ Удалить чат</div>
    </div>

    <script>
        const socket = io({ transports: ["websocket", "polling"] });
        let selectedRoom = null;

        function closeAllMenus() {
            document.getElementById('ctx-menu').style.display = 'none';
        }

        function onRoomContextMenu(e, roomId) {
            e.preventDefault();
            e.stopPropagation();
            selectedRoom = roomId;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function openModal() {
            document.getElementById('delete-modal').style.display = 'flex';
            closeAllMenus();
        }

        function closeModal() {
            document.getElementById('delete-modal').style.display = 'none';
        }

        function confirmDelete() {
            const forAll = document.getElementById('delete-for-all-cb').checked;
            socket.emit('delete_chat', {
                chat_id: selectedRoom,
                delete_for_all: forAll
            });
            closeModal();
        }

        socket.on('chat_deleted_globally', (data) => {
            alert("Чат был удален для всех");
            location.reload();
        });

        socket.on('chat_hidden_locally', () => {
            location.reload();
        });
    </script>
</body>
</html>
