<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CAT">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#090c12">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=cat">
    <title>CAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --primary: #7c5cfc;
            --primary-dark: #6a48e0;
            --accent: #38bdf8;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #090c12;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-container {
            display: flex;
            height: 100vh;
            height: 100dvh;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 320px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-btns {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            position: relative;
        }

        .icon-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
        .icon-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .badge-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            font-size: 0.6rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            display: none;
        }

        .badge-count.show {
            display: flex;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            padding: 15px 12px 8px;
        }

        .chat-item,
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .chat-item:hover,
        .friend-item:hover {
            background: var(--surface);
            color: var(--text);
        }

        .chat-item.active {
            background: rgba(124, 92, 252, 0.15);
            color: var(--text);
        }

        .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            font-size: 0.9rem;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-accept {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
            margin-left: auto;
            transition: 0.2s;
        }

        .badge-accept:hover {
            background: var(--primary-dark);
        }

        .friend-remove-btn {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .friend-remove-btn:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .profile-mini {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-mini:hover {
            background: var(--surface);
        }

        .avatar-mini {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--surface);
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-username {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* === CHAT AREA === */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 18px 25px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            min-height: 60px;
        }

        .back-btn {
            display: none;
            cursor: pointer;
            margin-right: 12px;
            font-size: 1.3rem;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--surface);
        }

        #messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 75%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.my {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        .msg:not(.my) .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .msg.my .msg-bubble {
            background: linear-gradient(135deg, var(--primary), #9b7cfc);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .msg-author {
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 2px;
            color: var(--accent);
            cursor: pointer;
        }

        .msg.my .msg-author {
            color: rgba(255, 255, 255, 0.8);
        }

        .msg-delete-btn {
            cursor: pointer;
            font-size: 0.7rem;
            color: #ef4444;
            margin-left: 8px;
            opacity: 0;
            transition: 0.2s;
        }

        .msg:hover .msg-delete-btn {
            opacity: 1;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            gap: 15px;
        }

        .empty-chat-icon {
            font-size: 4rem;
            opacity: 0.3;
        }

        .input-box {
            padding: 20px 25px;
            display: flex;
            gap: 12px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .input-msg {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 30px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .input-msg:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
        }

        .btn-send {
            background: var(--primary);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            transition: 0.2s;
        }

        .btn-send:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .btn-send:active {
            transform: scale(0.95);
        }

        /* === NOTIFICATIONS === */
        .notif-overlay {
            position: fixed;
            top: 60px;
            right: 20px;
            width: 360px;
            max-height: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .notif-overlay.open {
            display: block;
        }

        .notif-header {
            padding: 15px 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            z-index: 1;
        }

        .notif-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.2s;
        }

        .notif-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .notif-text {
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .notif-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .notif-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-sm.primary {
            background: var(--primary);
            color: white;
        }

        .btn-sm.primary:hover {
            background: var(--primary-dark);
        }

        .btn-sm.danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-sm.danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* === MODALS === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px;
            width: 420px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .modal h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
        }

        .input-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .modal-switch {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .modal-switch a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }

        .modal-switch a:hover {
            text-decoration: underline;
        }

        .error-text {
            color: var(--danger);
            font-size: 0.8rem;
            min-height: 20px;
        }

        .avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px;
            border: 3px solid var(--primary);
            background: var(--surface);
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 14px;
            z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.info {
            border-left: 4px solid var(--accent);
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: 0;
                top: 0;
                height: 100vh;
                height: 100dvh;
                z-index: 20;
            }

            .sidebar.hidden {
                display: none;
            }

            .chat-area {
                width: 100%;
            }

            .back-btn {
                display: block;
            }

            .notif-overlay {
                width: 95vw;
                right: 2.5vw;
            }
        }
    </style>
</head>
<body>

    <!-- === AUTH OVERLAY === -->
    <div id="authOverlay" class="modal-overlay active">
        <div class="modal">
            <h2>😸 <span style="background:linear-gradient(135deg,#7c5cfc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">CAT</span></h2>
            <div id="authError" class="error-text" style="text-align:center;margin-bottom:15px;"></div>
            <div id="loginForm">
                <div class="input-group"><label for="loginUser">Username</label><input type="text" id="loginUser" placeholder="@username" autocomplete="username"></div>
                <div class="input-group"><label for="loginPass">Пароль</label><input type="password" id="loginPass" placeholder="••••" autocomplete="current-password"></div>
                <button class="btn btn-primary" id="loginBtn">Войти</button>
                <div class="modal-switch">Нет аккаунта? <a id="switchToRegister">Создать</a></div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="input-group"><label for="regUser">Username</label><input type="text" id="regUser" placeholder="@username" value="@" autocomplete="username"></div>
                <div class="input-group"><label for="regName">Имя (Ник)</label><input type="text" id="regName" placeholder="Ваше имя" autocomplete="name"></div>
                <div class="input-group"><label for="regPass">Пароль</label><input type="password" id="regPass" placeholder="минимум 4 символа" autocomplete="new-password"></div>
                <div class="input-group"><label for="regPass2">Повторите пароль</label><input type="password" id="regPass2" placeholder="повторите пароль" autocomplete="new-password"></div>
                <div id="regError" class="error-text"></div>
                <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
                <div class="modal-switch">Уже есть аккаунт? <a id="switchToLogin">Войти</a></div>
            </div>
        </div>
    </div>

    <!-- === PROFILE OVERLAY === -->
    <div id="profileOverlay" class="modal-overlay">
        <div class="modal">
            <h2>👤 Профиль</h2>
            <img id="profileAvatar" class="avatar-large" src="" alt="Аватар">
            <div class="input-group"><label for="profileName">Имя</label><input type="text" id="profileName"></div>
            <div class="input-group"><label for="profileUser">Username</label><input type="text" id="profileUser" disabled></div>
            <div class="input-group"><label for="profileBio">Описание</label><textarea id="profileBio" rows="2"></textarea></div>
            <div class="input-group"><label for="profileAvatarUrl">URL Аватара</label><input type="text" id="profileAvatarUrl"></div>
            <button class="btn btn-primary" id="saveProfileBtn">💾 Сохранить</button>
            <button class="btn btn-secondary" id="cancelProfileBtn">Отмена</button>
            <button class="btn btn-danger" id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <!-- === FRIEND OVERLAY === -->
    <div id="friendOverlay" class="modal-overlay">
        <div class="modal">
            <h2>🔍 Найти друга</h2>
            <div class="input-group"><label for="searchUser">Username</label><input type="text" id="searchUser" placeholder="@username"></div>
            <div id="friendError" class="error-text"></div>
            <button class="btn btn-primary" id="sendFriendReqBtn">📨 Отправить запрос</button>
            <button class="btn btn-secondary" id="cancelFriendBtn">Отмена</button>
        </div>
    </div>

    <!-- === USER PROFILE OVERLAY === -->
    <div id="userProfileOverlay" class="modal-overlay">
        <div class="modal" id="userProfileContent"></div>
    </div>

    <!-- === NOTIFICATIONS PANEL === -->
    <div class="notif-overlay" id="notifPanel">
        <div class="notif-header"><span>🔔 Уведомления</span><span style="cursor:pointer" id="closeNotifBtn">✕</span></div>
        <div id="notifList"></div>
    </div>

    <!-- === TOAST === -->
    <div id="toast" class="toast"></div>

    <!-- === MAIN APP === -->
    <div class="app-container" id="mainApp" style="display:none;">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">CAT</span>
                <div class="header-btns">
                    <button class="icon-btn" id="toggleNotifBtn" aria-label="Уведомления">🔔<span class="badge-count" id="notifBadge"></span></button>
                    <button class="icon-btn" id="openFriendModalBtn" aria-label="Добавить друга">+</button>
                    <button class="icon-btn" id="openProfileBtn" aria-label="Профиль">👤</button>
                </div>
            </div>
            <div class="sidebar-nav">
                <div class="section-label">💬 Каналы</div>
                <div id="roomList"></div>
                <div class="section-label">👥 Друзья</div>
                <div id="friendList"></div>
            </div>
            <div class="profile-mini" id="profileMiniBtn">
                <img id="myAvatar" class="avatar-mini" src="" alt="Мой аватар">
                <div class="profile-info">
                    <div class="profile-name" id="myName">—</div>
                    <div class="profile-username" id="myUsername">@—</div>
                    <div id="myRole" style="font-size:0.7rem; color: #f59e0b; margin-top: 2px;"></div>
                </div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <span class="back-btn" id="backBtn">←</span>
                <span id="chatHeader"># Общий канал</span>
            </div>
            <div id="messages">
                <div class="empty-chat">
                    <div class="empty-chat-icon">💬</div>
                    <div>Выберите чат</div>
                </div>
            </div>
            <div class="input-box">
                <input type="text" class="input-msg" id="msgInput" placeholder="Написать сообщение..." maxlength="1000" autocomplete="off">
                <button class="btn-send" id="sendBtn" aria-label="Отправить">➤</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ==================== DOM REFS ====================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const authOverlay = $('#authOverlay');
            const loginForm = $('#loginForm');
            const registerForm = $('#registerForm');
            const authError = $('#authError');
            const regError = $('#regError');
            const loginUser = $('#loginUser');
            const loginPass = $('#loginPass');
            const regUser = $('#regUser');
            const regName = $('#regName');
            const regPass = $('#regPass');
            const regPass2 = $('#regPass2');
            const mainApp = $('#mainApp');
            const sidebar = $('#sidebar');
            const messagesContainer = $('#messages');
            const msgInput = $('#msgInput');
            const chatHeader = $('#chatHeader');
            const notifPanel = $('#notifPanel');
            const notifList = $('#notifList');
            const notifBadge = $('#notifBadge');
            const toast = $('#toast');
            const profileOverlay = $('#profileOverlay');
            const friendOverlay = $('#friendOverlay');
            const userProfileOverlay = $('#userProfileOverlay');
            const userProfileContent = $('#userProfileContent');
            const myAvatar = $('#myAvatar');
            const myName = $('#myName');
            const myUsername = $('#myUsername');
            const myRole = $('#myRole');
            const roomList = $('#roomList');
            const friendList = $('#friendList');

            // ==================== STATE ====================
            const socket = io();
            let myData = null;
            let currentRoom = 'Общий';
            let notifications = [];
            let dmUser = null;
            let typingTimer = null;
            let toastTimer = null;

            // ==================== HELPERS ====================
            function escapeHtml(t) {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return String(t).replace(/[&<>"']/g, (c) => map[c]);
            }

            function showToast(m, type = 'success') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = m;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function openModal(id) {
                const el = typeof id === 'string' ? $(id) : id;
                if (el) el.classList.add('active');
            }

            function closeModal(id) {
                const el = typeof id === 'string' ? $(id) : id;
                if (el) el.classList.remove('active');
            }

            function switchAuth(mode) {
                const isLogin = mode === 'login';
                loginForm.style.display = isLogin ? 'block' : 'none';
                registerForm.style.display = isLogin ? 'none' : 'block';
                authError.textContent = '';
                regError.textContent = '';
                if (isLogin) {
                    loginUser.focus();
                } else {
                    regUser.value = '@';
                    regUser.focus();
                }
            }

            function timeAgo(d) {
                const s = Math.floor((new Date() - d) / 1000);
                if (s < 60) return 'только что';
                if (s < 3600) return Math.floor(s / 60) + ' мин назад';
                if (s < 86400) return Math.floor(s / 3600) + ' ч назад';
                return Math.floor(s / 86400) + ' дн назад';
            }

            function updateBadge() {
                const total = (myData && myData.requests ? myData.requests.length : 0) +
                    notifications.filter((n) => !n.read).length;
                if (total > 0) {
                    notifBadge.textContent = total;
                    notifBadge.classList.add('show');
                } else {
                    notifBadge.classList.remove('show');
                }
            }

            function updateMyInfo() {
                if (!myData) return;
                myName.textContent = myData.display_name || myData.username;
                myUsername.textContent = '@' + myData.username;
                myAvatar.src = myData.avatar || '';
                const roleNames = { 'owner': '👑 Владелец', 'admin': '🛡️ Админ', 'moderator': '🛡️ Модер', 'user': '👤 Пользователь' };
                if (myRole) myRole.textContent = roleNames[myData.role] || '';
            }

            function loadProfile() {
                if (!myData) return;
                $('#profileName').value = myData.display_name || '';
                $('#profileUser').value = '@' + myData.username;
                $('#profileBio').value = myData.bio || '';
                $('#profileAvatarUrl').value = myData.avatar || '';
                $('#profileAvatar').src = myData.avatar || '';
            }

            function saveProfile() {
                const n = $('#profileName').value.trim();
                const b = $('#profileBio').value.trim();
                const a = $('#profileAvatarUrl').value.trim();
                if (!n) {
                    showToast('Имя обязательно', 'error');
                    return;
                }
                socket.emit('update_profile', { username: myData.username, display_name: n, bio: b, avatar: a });
            }

            function logout() {
                localStorage.removeItem('cat_user');
                localStorage.removeItem('cat_pass');
                myData = null;
                dmUser = null;
                notifications = [];
                currentRoom = 'Общий';
                mainApp.style.display = 'none';
                authOverlay.classList.add('active');
                messagesContainer.innerHTML =
                    '<div class="empty-chat"><div class="empty-chat-icon">💬</div><div>Выберите чат</div></div>';
                closeModal(profileOverlay);
                switchAuth('login');
            }

            function renderNotifications() {
                const reqs = (myData && myData.requests || []).map((u) => ({
                    type: 'friend_request',
                    from: u,
                    text: '@' + u + ' хочет добавить вас в друзья',
                    timestamp: Date.now() / 1000
                }));
                const all = reqs.concat(notifications);
                if (all.length === 0) {
                    notifList.innerHTML =
                        '<div style="padding:30px;text-align:center;color:var(--text-secondary);">Нет уведомлений</div>';
                    return;
                }
                notifList.innerHTML = all.map((n) => {
                    let btns = '';
                    if (n.type === 'friend_request') {
                        btns =
                            '<div class="notif-actions"><button class="btn-sm primary" data-accept="' +
                            escapeHtml(n.from) +
                            '">✓ Принять</button><button class="btn-sm danger" data-decline="' +
                            escapeHtml(n.from) + '">✕ Отклонить</button></div>';
                    }
                    const notifText = n.type === 'new_message' ? '💬 @' + n.from + ': ' + n.text : n.text;
                    const onClick = n.type === 'new_message' ?
                        ' data-dm="' + escapeHtml(n.from) + '" style="cursor:pointer;"' :
                        '';
                    return '<div class="notif-item"' + onClick + '><div class="notif-text">' + escapeHtml(notifText) +
                        '</div><div class="notif-time">' + new Date(n.timestamp * 1000).toLocaleString() + '</div>' +
                        btns + '</div>';
                }).join('');
            }

            function toggleNotifPanel() {
                const isOpen = notifPanel.classList.contains('open');
                if (isOpen) {
                    notifPanel.classList.remove('open');
                } else {
                    renderNotifications();
                    notifPanel.classList.add('open');
                }
            }

            function updateFriendList() {
                if (!myData) return;
                updateBadge();
                let h = '';
                (myData.requests || []).forEach((u) => {
                    h += '<div class="friend-item" style="border:1px dashed var(--primary);"><div class="chat-avatar">👤</div><span style="flex:1;">@' +
                        escapeHtml(u) +
                        '</span><button class="badge-accept" data-accept="' + escapeHtml(u) +
                        '">✓ Принять</button></div>';
                });
                (myData.friends || []).forEach((u) => {
                    h += '<div class="friend-item"><img class="chat-avatar friend-avatar-' + u +
                        '" data-viewprofile="' + escapeHtml(u) +
                        '" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=' + u +
                        '" style="object-fit:cover;border-radius:12px;width:38px;height:38px;" alt="Аватар ' +
                        escapeHtml(u) + '"><span style="flex:1;" data-dm="' + escapeHtml(u) +
                        '"><span style="font-weight:600;">@' + escapeHtml(u) +
                        '</span><span id="status_' + u +
                        '" style="display:block;font-size:0.65rem;color:var(--text-secondary);"></span></span><span class="friend-remove-btn" data-remove="' +
                        escapeHtml(u) + '">✕</span></div>';
                    socket.emit('get_avatar', { username: u });
                });
                if (!h) h =
                    '<div style="padding:10px;color:var(--text-secondary);font-size:0.8rem;">Нет друзей</div>';
                friendList.innerHTML = h;
                (myData.friends || []).forEach((u) => {
                    socket.emit('check_status', { username: u });
                });
            }

            function updateRoomList() {
                roomList.innerHTML =
                    '<div class="chat-item active" data-room="Общий"><div class="chat-avatar">🌍</div><span>Общий канал</span></div>';
            }

            function switchRoom(r) {
                currentRoom = r;
                messagesContainer.innerHTML = '';
                if (r === 'Общий') {
                    chatHeader.textContent = '# Общий канал';
                    dmUser = null;
                } else if (r.startsWith('dm_')) {
                    chatHeader.textContent = '💬 @' + dmUser;
                }
                $$('.chat-item').forEach((el) => {
                    el.classList.toggle('active', el.getAttribute('data-room') === r);
                });
                socket.emit('join', { room: r });
                if (r.startsWith('dm_')) {
                    socket.emit('mark_read', { room: r, username: myData.username });
                }
                if (window.innerWidth <= 768) {
                    sidebar.classList.add('hidden');
                }
                if (r.startsWith('dm_') && dmUser) {
                    notifications = notifications.filter((n) => n.from !== dmUser);
                    updateBadge();
                }
            }

            function goBack() {
                sidebar.classList.remove('hidden');
            }

            function sendMsg() {
                const t = msgInput.value.trim();
                if (!t || !myData) return;
                socket.emit('message', {
                    room: currentRoom,
                    text: t,
                    user: myData.display_name,
                    username: myData.username,
                    avatar: myData.avatar
                });
                msgInput.value = '';
                msgInput.focus();
            }

            function deleteMessage(id) {
                if (!confirm('Удалить сообщение?')) return;
                socket.emit('delete_message', { msg_id: id, username: myData.username });
            }

            function renderMessage(m) {
                if (messagesContainer.querySelector('.empty-chat')) messagesContainer.innerHTML = '';
                const isMy = m.username === (myData ? myData.username : '');
                const div = document.createElement('div');
                div.className = 'msg' + (isMy ? ' my' : '');
                const canDel = myData && ['owner', 'admin', 'moderator'].includes(myData.role);
                const delBtn = canDel ?
                    '<span class="msg-delete-btn" data-delete="' + m.timestamp +
                    '" title="Удалить">✕</span>' :
                    '';
                const avUrl = 'https://ui-avatars.com/api/?name=' + m.username + '&background=7c5cfc&color=fff&size=40';
                const avHtml =
                    '<img class="msg-avatar" src="' + escapeHtml(m.avatar || avUrl) + '" onerror="this.src=\'' + avUrl +
                    '\'" data-viewprofile="' + escapeHtml(m.username) +
                    '" style="cursor:pointer;" title="Посмотреть профиль" alt="Аватар ' + escapeHtml(m.username) + '">';
                const readMark = isMy ?
                    (m.read ?
                        '<span style="font-size:0.75rem;color:#38bdf8;font-weight:bold;">✓✓</span>' :
                        '<span style="font-size:0.75rem;color:#7c5cfc;">✓</span>') :
                    '';
                const authHtml = isMy ?
                    '' :
                    '<div class="msg-author" data-viewprofile="' + escapeHtml(m.username) +
                    '" style="cursor:pointer;color:var(--accent);" title="Посмотреть профиль">' + escapeHtml(m.user ||
                        m.username) + '</div>';
                div.innerHTML = avHtml + '<div class="msg-bubble">' + authHtml + escapeHtml(m.text) + ' ' + readMark +
                    delBtn + '</div>';
                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function startDM(u) {
                dmUser = u;
                const parts = [myData.username, u].sort();
                switchRoom('dm_' + parts[0] + '_' + parts[1]);
            }

            function viewProfile(u) {
                if (u === myData.username) {
                    openModal(profileOverlay);
                    loadProfile();
                    return;
                }
                socket.emit('get_user_profile', { username: u, requester: myData.username });
            }

            function acceptFriend(u) {
                socket.emit('accept_friend', { my_username: myData.username, target_username: u });
            }

            function declineFriend(u) {
                socket.emit('decline_friend', { my_username: myData.username, target_username: u });
            }

            function removeFriend(u) {
                if (!confirm('Удалить @' + u + ' из друзей?')) return;
                socket.emit('remove_friend', { my_username: myData.username, target_username: u });
            }

            function sendFriendReqTo(u) {
                socket.emit('send_friend_request', { my_username: myData.username, target_username: u });
                showToast('Запрос отправлен', 'success');
                closeModal(userProfileOverlay);
            }

            // ==================== AUTH HANDLERS ====================
            function handleLogin() {
                const u = loginUser.value.trim();
                const p = loginPass.value;
                authError.textContent = '';
                if (!u || !p) {
                    authError.textContent = 'Заполните все поля';
                    return;
                }
                socket.emit('auth', { action: 'login', username: u, password: p });
            }

            function handleRegister() {
                const u = regUser.value.trim();
                const n = regName.value.trim();
                const p = regPass.value;
                const p2 = regPass2.value;
                regError.textContent = '';
                if (!u || !n || !p || !p2) {
                    regError.textContent = 'Заполните все поля';
                    return;
                }
                if (u.length < 3) {
                    regError.textContent = 'Логин: минимум 3 символа';
                    return;
                }
                if (p.length < 4) {
                    regError.textContent = 'Пароль: минимум 4 символа';
                    return;
                }
                if (p !== p2) {
                    regError.textContent = 'Пароли не совпадают';
                    return;
                }
                socket.emit('auth', { action: 'register', username: u, display_name: n, password: p, password2: p2 });
            }

            // ==================== SOCKET HANDLERS ====================
            socket.on('auth_result', (d) => {
                if (d.success) {
                    myData = d.user;
                    localStorage.setItem('cat_user', myData.username);
                    localStorage.setItem('cat_pass', loginPass.value || localStorage.getItem('cat_pass') || '');
                    notifications = myData.notifications || [];
                    authOverlay.classList.remove('active');
                    mainApp.style.display = 'flex';
                    updateMyInfo();
                    updateBadge();
                    updateFriendList();
                    updateRoomList();
                    switchRoom('Общий');
                } else {
                    if (registerForm.style.display !== 'none') {
                        regError.textContent = d.error;
                    } else {
                        authError.textContent = d.error;
                    }
                }
            });

            socket.on('profile_updated', (d) => {
                myData = d.user;
                updateMyInfo();
                showToast('Профиль обновлён!', 'success');
                closeModal(profileOverlay);
            });

            socket.on('friend_online', (d) => {
                const s = document.getElementById('status_' + d.username);
                if (s) {
                    s.textContent = d.online ? '🟢 Онлайн' : '⚫ Оффлайн';
                }
            });

            socket.on('friend_avatar', (d) => {
                $$('.friend-avatar-' + d.username).forEach((i) => {
                    i.src = d.avatar || 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=' + d
                        .username;
                });
            });

            socket.on('user_profile', (d) => {
                if (d.error) {
                    showToast(d.error, 'error');
                    return;
                }
                const u = d.user;
                const isF = myData.friends && myData.friends.includes(d.username);
                const isR = myData.requests && myData.requests.includes(d.username);
                const isBy = u.requests && u.requests.includes(myData.username);
                const rn = { 'owner': '👑 Владелец', 'admin': '🛡️ Админ', 'moderator': '🛡️ Модер', 'user': '👤 Пользователь' };
                const rc = u.role === 'owner' ? 'color:#f59e0b;' : u.role === 'admin' ? 'color:#ef4444;' : u.role ===
                    'moderator' ? 'color:#10b981;' : 'color:#94a3b8;';
                const ls = u.last_seen ? new Date(u.last_seen * 1000) : null;
                const st = u.online ? '🟢 Онлайн' : (ls ? 'Был(а) ' + timeAgo(ls) : '');
                let h = '<h2>👤 Профиль</h2>';
                h += '<img src="' + escapeHtml(u.avatar || '') + '" class="avatar-large" alt="Аватар">';
                h += '<div style="text-align:center;font-size:1.2rem;font-weight:700;">' + escapeHtml(u.display_name) +
                    '</div>';
                h += '<div style="text-align:center;color:var(--text-secondary);">@' + escapeHtml(d.username) + '</div>';
                h += '<div style="text-align:center;font-weight:600;' + rc + '">' + (rn[u.role] || '👤 Пользователь') +
                    '</div>';
                h += '<div style="text-align:center;font-size:0.75rem;color:var(--text-secondary);margin-top:4px;">' + st +
                    '</div>';
                h += '<div style="text-align:center;margin:10px 0;padding:8px;background:var(--surface);border-radius:8px;">' +
                    escapeHtml(u.bio || '') + '</div>';
                h +=
                    '<div style="display:flex;gap:20px;justify-content:center;margin:10px 0;color:var(--text-secondary);font-size:0.85rem;"><span>Друзей: ' +
                    (u.friends ? u.friends.length : 0) + '</span></div>';
                if (!isF && !isBy && !isR) {
                    h += '<button class="btn btn-primary" data-sendreq="' + d.username +
                        '">📨 Добавить в друзья</button>';
                } else if (isR) {
                    h += '<button class="btn btn-primary" data-accept="' + d.username +
                        '">✓ Принять запрос</button>';
                } else if (isBy) {
                    h += '<button class="btn btn-secondary" disabled>⏳ Запрос отправлен</button>';
                } else if (isF) {
                    h += '<button class="btn btn-primary" data-dm="' + d.username + '">💬 Написать</button>';
                }
                h += '<button class="btn btn-primary" data-call="' + d.username + '">📞 Позвонить</button>';
                h += '<button class="btn btn-secondary" data-close-profile>Закрыть</button>';
                userProfileContent.innerHTML = h;
                openModal(userProfileOverlay);
            });

            socket.on('friend_msg', (d) => {
                showToast(d.text, d.type || 'info');
            });

            socket.on('incoming_friend_request', (d) => {
                if (myData && d.user && d.user.username === myData.username) {
                    myData = d.user;
                    updateFriendList();
                    updateBadge();
                    showToast('@' + d.from + ' хочет добавить вас в друзья', 'info');
                }
            });

            socket.on('friend_accepted_notify', (d) => {
                if (myData && d.user && d.user.username === myData.username) {
                    myData = d.user;
                    updateFriendList();
                    showToast('@' + d.by + ' принял ваш запрос', 'success');
                }
            });

            socket.on('friend_removed_notify', (d) => {
                if (myData && d.user && d.user.username === myData.username) {
                    myData = d.user;
                    updateFriendList();
                    showToast('@' + d.by + ' удалил вас из друзей', 'info');
                }
            });

            socket.on('new_notification', (n) => {
                notifications.unshift(n);
                updateBadge();
                showToast(n.text, 'info');
            });

            socket.on('user_typing', (d) => {
                chatHeader.textContent = '💬 @' + dmUser + ' (печатает...)';
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => {
                    chatHeader.textContent = '💬 @' + dmUser;
                }, 1000);
            });

            socket.on('message', (m) => {
                let mr = m.room || '';
                let myR = currentRoom || '';
                if (mr.startsWith('dm_')) {
                    const p = mr.split('_');
                    if (p.length >= 3) {
                        const s = [p[1], p[2]].sort();
                        mr = 'dm_' + s[0] + '_' + s[1];
                    }
                }
                if (myR.startsWith('dm_')) {
                    const p = myR.split('_');
                    if (p.length >= 3) {
                        const s = [p[1], p[2]].sort();
                        myR = 'dm_' + s[0] + '_' + s[1];
                    }
                }
                if (mr === myR) renderMessage(m);
            });

            socket.on('history', (h) => {
                messagesContainer.innerHTML = '';
                if (!h || h.length === 0) {
                    messagesContainer.innerHTML =
                        '<div class="empty-chat"><div class="empty-chat-icon">💬</div><div>Нет сообщений</div></div>';
                } else {
                    h.forEach((m) => renderMessage(m));
                }
            });

            socket.on('message_deleted', () => {
                socket.emit('join', { room: currentRoom });
            });

            socket.on('messages_read', (data) => {
                socket.emit('join', { room: currentRoom });
                if (data.by !== myData.username) {
                    $$('.msg.my .msg-bubble span').forEach((el) => {
                        if (el.textContent.trim() === '✓') {
                            el.innerHTML = '✓✓';
                            el.style.color = '#38bdf8';
                            el.style.fontWeight = 'bold';
                        }
                    });
                }
            });

            socket.on('new_dm', (data) => {
                const notif = {
                    type: 'new_message',
                    from: data.from,
                    text: data.text,
                    timestamp: Date.now() / 1000,
                    read: false
                };
                notifications.unshift(notif);
                updateBadge();
                showToast('💬 @' + data.from + ': ' + data.text, 'info');
            });

            // ==================== WebRTC (совместимо с бэкендом) ====================
            let localStream = null;
            let peerConnection = null;
            let currentCallUser = null;
            const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

            async function startCall(u) {
                currentCallUser = u;
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    peerConnection = new RTCPeerConnection(rtcConfig);
                    localStream.getTracks().forEach((t) => peerConnection.addTrack(t, localStream));
                    peerConnection.onicecandidate = (e) => {
                        if (e.candidate) socket.emit('call_signal', { to: u, ice: e.candidate });
                    };
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('call_user', { to: u, sdp: offer });
                    showToast('📞 Звоним @' + u, 'info');
                } catch (e) {
                    showToast('Ошибка микрофона', 'error');
                    console.error('startCall error:', e);
                }
            }

            function hangUp() {
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach((t) => t.stop());
                    localStream = null;
                }
                currentCallUser = null;
            }

            socket.on('incoming_call', async (d) => {
                if (confirm('📞 @' + d.from + ' звонит! Принять?')) {
                    currentCallUser = d.from;
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        peerConnection = new RTCPeerConnection(rtcConfig);
                        localStream.getTracks().forEach((t) => peerConnection.addTrack(t, localStream));
                        peerConnection.onicecandidate = (e) => {
                            if (e.candidate) socket.emit('call_signal', { to: d.from, ice: e.candidate });
                        };
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp));
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        socket.emit('call_accepted', { to: d.from, sdp: answer });
                    } catch (e) {
                        console.error('incoming_call error:', e);
                        hangUp();
                    }
                } else {
                    // Отправляем отклонение (бэкенд может не иметь обработчика, но это безопасно)
                    socket.emit('call_rejected', { to: d.from });
                }
            });

            socket.on('call_accepted', async (d) => {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp));
                    showToast('📞 Соединение установлено!', 'success');
                } catch (e) {
                    console.error('call_accepted error:', e);
                }
            });

            socket.on('call_signal', (d) => {
                if (d.ice && peerConnection) {
                    peerConnection.addIceCandidate(new RTCIceCandidate(d.ice)).catch(console.error);
                }
            });

            // ==================== EVENT LISTENERS ====================
            // Auth
            $('#loginBtn').addEventListener('click', handleLogin);
            $('#registerBtn').addEventListener('click', handleRegister);
            $('#switchToRegister').addEventListener('click', () => switchAuth('register'));
            $('#switchToLogin').addEventListener('click', () => switchAuth('login'));
            loginPass.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
            regPass2.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleRegister(); });
            regUser.addEventListener('input', function() {
                if (!this.value.startsWith('@')) this.value = '@' + this.value.replace(/@/g, '');
            });

            // Profile
            $('#openProfileBtn').addEventListener('click', () => { openModal(profileOverlay);
                loadProfile(); });
            $('#profileMiniBtn').addEventListener('click', () => { openModal(profileOverlay);
                loadProfile(); });
            $('#saveProfileBtn').addEventListener('click', saveProfile);
            $('#cancelProfileBtn').addEventListener('click', () => closeModal(profileOverlay));
            $('#logoutBtn').addEventListener('click', logout);

            // Friends
            $('#openFriendModalBtn').addEventListener('click', () => {
                $('#searchUser').value = '@';
                $('#friendError').textContent = '';
                openModal(friendOverlay);
            });
            $('#sendFriendReqBtn').addEventListener('click', () => {
                const t = $('#searchUser').value.trim();
                if (!t || t === '@') {
                    $('#friendError').textContent = 'Введите username';
                    return;
                }
                socket.emit('send_friend_request', { my_username: myData.username, target_username: t });
                closeModal(friendOverlay);
            });
            $('#cancelFriendBtn').addEventListener('click', () => closeModal(friendOverlay));
            $('#searchUser').addEventListener('focus', function() {
                if (this.value === '') this.value = '@';
            });
            $('#searchUser').addEventListener('input', function() {
                if (!this.value.startsWith('@')) this.value = '@' + this.value.replace(/@/g, '');
            });

            // Notifications
            $('#toggleNotifBtn').addEventListener('click', toggleNotifPanel);
            $('#closeNotifBtn').addEventListener('click', () => notifPanel.classList.remove('open'));

            // Chat
            $('#sendBtn').addEventListener('click', sendMsg);
            $('#backBtn').addEventListener('click', goBack);
            msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
            msgInput.addEventListener('input', () => {
                if (currentRoom.startsWith('dm_') && myData) {
                    socket.emit('typing', { room: currentRoom, username: myData.username, user: myData
                            .display_name });
                }
            });

            // Global delegated events
            document.addEventListener('click', (e) => {
                const target = e.target;

                // Accept friend
                if (target.matches('[data-accept]')) {
                    e.stopPropagation();
                    acceptFriend(target.getAttribute('data-accept'));
                    toggleNotifPanel();
                    closeModal(userProfileOverlay);
                    return;
                }

                // Decline friend
                if (target.matches('[data-decline]')) {
                    e.stopPropagation();
                    declineFriend(target.getAttribute('data-decline'));
                    toggleNotifPanel();
                    return;
                }

                // Remove friend
                if (target.matches('[data-remove]')) {
                    e.stopPropagation();
                    removeFriend(target.getAttribute('data-remove'));
                    return;
                }

                // Start DM
                if (target.matches('[data-dm]')) {
                    const u = target.getAttribute('data-dm');
                    startDM(u);
                    toggleNotifPanel();
                    closeModal(userProfileOverlay);
                    return;
                }

                // View profile
                if (target.matches('[data-viewprofile]')) {
                    viewProfile(target.getAttribute('data-viewprofile'));
                    return;
                }

                // Delete message
                if (target.matches('[data-delete]')) {
                    e.stopPropagation();
                    deleteMessage(target.getAttribute('data-delete'));
                    return;
                }

                // Send friend request from profile
                if (target.matches('[data-sendreq]')) {
                    sendFriendReqTo(target.getAttribute('data-sendreq'));
                    return;
                }

                // Call from profile
                if (target.matches('[data-call]')) {
                    const u = target.getAttribute('data-call');
                    startCall(u);
                    closeModal(userProfileOverlay);
                    return;
                }

                // Close profile
                if (target.matches('[data-close-profile]')) {
                    closeModal(userProfileOverlay);
                    return;
                }

                // Room switch
                if (target.matches('[data-room]') || target.closest('[data-room]')) {
                    const el = target.matches('[data-room]') ? target : target.closest('[data-room]');
                    switchRoom(el.getAttribute('data-room'));
                    return;
                }
            });

            // Close modals on overlay click
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) {
                    closeModal(e.target);
                }
            });

            // Keyboard shortcut: Escape to close modals
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    $$('.modal-overlay.active').forEach((el) => closeModal(el));
                    if (notifPanel.classList.contains('open')) notifPanel.classList.remove('open');
                }
            });

            // Responsive: click outside sidebar to close
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 768 &&
                    sidebar.classList.contains('hidden') === false &&
                    !sidebar.contains(e.target) &&
                    e.target !== $('#backBtn') &&
                    !$('#backBtn').contains(e.target)) {
                    // Don't auto-close; user must use back button
                }
            });

            // Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/static/sw.js').catch(() => {});
            }

            // ==================== INIT ====================
            const savedUser = localStorage.getItem('cat_user');
            const savedPass = localStorage.getItem('cat_pass');
            if (savedUser && savedPass) {
                socket.emit('auth', { action: 'login', username: savedUser, password: savedPass });
            }

        })();
    </script>
</body>
</html>
