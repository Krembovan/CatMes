<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SCAM CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        /* Стили модалки из твоего скриншота */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; align-items: center; justify-content: center; }
        .modal-card { background: #1e212b; padding: 30px; border-radius: 20px; width: 350px; text-align: center; color: white; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-red { background: #ff4747; color: white; }
        .btn-gray { background: #3e4147; color: white; }
    </style>
</head>
<body onclick="hideAll()">
    <div id="del-modal" class="modal-overlay">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2>Удалить чат?</h2>
            <p>Вы уверены, что хотите удалить историю переписки?</p>
            <label><input type="checkbox" id="del-all"> Удалить для собеседника</label><br><br>
            <button class="btn btn-gray" onclick="toggleModal(false)">ОТМЕНА</button>
            <button class="btn btn-red" onclick="confirmDelete()">УДАЛИТЬ</button>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ ПЕРВОЙ СТРОКОЙ
        const socket = io(); 
        let currentTarget = null;

        function hideAll() { /* Логика скрытия меню */ }
        
        function toggleModal(show, rid) {
            currentTarget = rid || currentTarget;
            document.getElementById('del-modal').style.display = show ? 'flex' : 'none';
        }

        function confirmDelete() {
            socket.emit('delete_chat', {
                chat_id: currentTarget,
                delete_for_all: document.getElementById('del-all').checked,
                my_nick: localStorage.getItem('nick')
            });
            toggleModal(false);
        }

        socket.on('chat_deleted_globally', () => location.reload());
    </script>
</body>
</html>
