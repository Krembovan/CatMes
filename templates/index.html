<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --surface: #161b22; 
            --primary: #6e57e0; /* Фиолетовый */
            --accent: #4a90e2;  /* Синий */
            --text: #e6edf3; 
            --border: rgba(255,255,255,0.08); 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .my-profile { 
            padding: 20px; background: linear-gradient(135deg, var(--primary), var(--accent)); 
            display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s;
        }
        .my-profile:hover { filter: brightness(1.1); }
        .avatar { width: 42px; height: 42px; border-radius: 12px; background: #21262d; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
        
        #room-list { flex: 1; padding-top: 10px; }
        .room-item { padding: 12px 20px; cursor: pointer; color: #8b949e; transition: 0.2s; }
        .room-item:hover, .room-item.active { background: rgba(110, 87, 224, 0.1); color: var(--text); border-left: 3px solid var(--primary); }

        /* Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { display: flex; gap: 12px; animation: fadeIn 0.3s; }
        .msg.my { flex-direction: row-reverse; }
        .msg-content { 
            background: #21262d; padding: 10px 16px; border-radius: 18px; 
            font-size: 0.95rem; border: 1px solid var(--border);
        }
        .msg.my .msg-content { background: var(--primary); border: none; }
        .msg-info { font-size: 0.75rem; color: #8b949e; margin-bottom: 3px; }

        .input-area { padding: 20px; display: flex; gap: 12px; border-top: 1px solid var(--border); }
        input { 
            flex: 1; background: #0d1117; border: 1px solid var(--border); 
            padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(110, 87, 224, 0.2); }
        .send-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-card { background: var(--surface); padding: 30px; border-radius: 24px; width: 360px; border: 1px solid var(--border); }
        .btn-modal { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onclick="hideContext()">

    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-card">
            <h2 style="color: var(--primary); text-align: center;">CYBER ACCESS</h2>
            <input type="text" id="auth-nick" placeholder="Username" style="width: 90%; margin-bottom: 10px;">
            <input type="password" id="auth-pass" placeholder="Passcode" style="width: 90%; margin-bottom: 20px;">
            <button class="send-btn" style="height: 50px; width: 100%;" onclick="login()">INITIALIZE</button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Cyber Profile</h3>
            <input type="text" id="edit-avatar" placeholder="Avatar URL" style="width: 90%; margin-bottom: 10px;">
            <input type="text" id="edit-bio" placeholder="Status/Bio" style="width: 90%; margin-bottom: 20px;">
            <button class="btn-modal" style="background: var(--primary); color: white;" onclick="saveProfile()">SAVE CHANGES</button>
            <button class="btn-modal" style="background: transparent; color: #8b949e;" onclick="closeProfile()">CANCEL</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="my-profile" onclick="openProfile()">
                <img src="" id="my-ava" class="avatar">
                <div>
                    <div id="my-nick-display" style="font-weight: bold;">Loading...</div>
                    <div id="my-bio-display" style="font-size: 0.7rem; opacity: 0.8;">Cyber Traveler</div>
                </div>
            </div>
            <div id="room-list"></div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="m-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">SEND</button>
            </div>
        </div>
    </div>

    <div id="ctx-menu" style="display:none; position:fixed; background:#1c2128; border-radius:8px; padding:5px; z-index:2000; border:1px solid var(--border);">
        <div style="color:#f85149; padding:10px; cursor:pointer;" onclick="openDeleteModal()">🗑 Delete Chat</div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";

        function login() {
            const nick = document.getElementById('auth-nick').value;
            const pass = document.getElementById('auth-pass').value;
            if(nick) socket.emit('auth', { nick, password: pass });
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'none';
                document.getElementById('my-nick-display').innerText = myData.nick;
                document.getElementById('my-bio-display').innerText = myData.bio || "Cyber Traveler";
                document.getElementById('my-ava').src = myData.avatar || 'https://i.imgur.com/6VBx3io.png';
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
        
        function saveProfile() {
            socket.emit('update_profile', {
                nick: myData.nick,
                avatar: document.getElementById('edit-avatar').value || myData.avatar,
                bio: document.getElementById('edit-bio').value || myData.bio
            });
        }

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="room-item active" onclick="switchRoom('Общий')"># Global Hub</div>`;
            Object.keys(rooms).forEach(id => {
                list.innerHTML += `<div class="room-item" onclick="switchRoom('${id}')"># ${rooms[id].name}</div>`;
            });
        });

        function send() {
            const input = document.getElementById('m-input');
            if (!input.value) return;
            socket.emit('message', {
                room: selectedRoom,
                text: input.value,
                user: myData.nick,
                avatar: myData.avatar
            });
            input.value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.user === myData.nick ? 'my' : ''}`;
            div.innerHTML = `
                <img src="${msg.avatar || 'https://i.imgur.com/6VBx3io.png'}" class="avatar" style="width:34px; height:34px;">
                <div>
                    <div class="msg-info">${msg.user}</div>
                    <div class="msg-content">${msg.text}</div>
                </div>
            `;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function hideContext() { document.getElementById('ctx-menu').style.display = 'none'; }
    </script>
</body>
</html>
