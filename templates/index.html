<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --surface: #161b22; 
            --primary: #6e57e0; 
            --accent: #4a90e2;  
            --text: #e6edf3; 
            --border: rgba(255,255,255,0.08); 
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Сайдбар */
        .sidebar { 
            width: 300px; background: var(--surface); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }
        .sidebar-header { padding: 10px 15px 20px; font-weight: 900; color: var(--primary); font-size: 1.2rem; }

        #room-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .room-item { 
            padding: 14px 18px; cursor: pointer; color: #8b949e; transition: 0.3s; 
            border-radius: 16px; display: flex; align-items: center; gap: 10px;
        }
        .room-item:hover { background: rgba(255, 255, 255, 0.03); color: #fff; }
        .room-item.active { background: linear-gradient(90deg, rgba(110, 87, 224, 0.2), transparent); color: var(--text); box-shadow: inset 4px 0 0 var(--primary); }

        /* Профиль слева внизу */
        .my-profile { 
            margin-top: 15px; padding: 12px; background: rgba(255, 255, 255, 0.03); 
            border-radius: 20px; display: flex; align-items: center; gap: 12px; 
            cursor: pointer; transition: 0.3s; border: 1px solid var(--border);
        }
        .my-profile:hover { background: rgba(110, 87, 224, 0.1); border-color: var(--primary); }
        .avatar { width: 40px; height: 40px; border-radius: 14px; background: #21262d; object-fit: cover; }

        /* Чат */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0d1117; position: relative; }
        #messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { display: flex; gap: 12px; max-width: 85%; }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-content { background: var(--surface); padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .msg.my .msg-content { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border-bottom-right-radius: 4px; }
        .msg:not(.my) .msg-content { border-bottom-left-radius: 4px; }

        /* Ввод */
        .input-wrapper { padding: 20px 30px 30px; }
        .input-area { background: var(--surface); padding: 8px 8px 8px 20px; border-radius: 25px; display: flex; gap: 10px; border: 1px solid var(--border); align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        /* Модалки */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--surface); padding: 30px; border-radius: 24px; width: 350px; border: 1px solid var(--border); text-align: center; }
        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* Контекстное меню */
        #ctx-menu { display: none; position: fixed; background: #1c2128; border-radius: 12px; padding: 6px; z-index: 3000; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ctx-item { padding: 10px 15px; cursor: pointer; color: #f85149; border-radius: 8px; transition: 0.2s; }
        .ctx-item:hover { background: rgba(248, 81, 73, 0.1); }
    </style>
</head>
<body onclick="hideContext()">

    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-card">
            <h2 style="margin-top: 0; color: var(--primary);">ВХОД В СИСТЕМУ</h2>
            <input type="text" id="auth-nick" placeholder="Ваш ник" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 10px; color: white;">
            <input type="password" id="auth-pass" placeholder="Пароль" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 20px; color: white;">
            <button class="btn-action" style="background: var(--primary); color: white;" onclick="login()">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-top: 0;">Удалить этот чат?</h3>
            <p style="color: #8b949e; font-size: 0.9rem;">История сообщений будет стерта.</p>
            <label style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; cursor: pointer;">
                <input type="checkbox" id="del-all-check"> Удалить для всех
            </label>
            <button class="btn-action" style="background: #f85149; color: white;" onclick="confirmDelete()">УДАЛИТЬ</button>
            <button class="btn-action" style="background: transparent; color: #8b949e;" onclick="closeDeleteModal()">ОТМЕНА</button>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-top: 0;">Настройки профиля</h3>
            <input type="text" id="edit-avatar" placeholder="Ссылка на аватар" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 10px; color: white;">
            <input type="text" id="edit-bio" placeholder="Ваш статус" style="width: 100%; box-sizing: border-box; background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; margin-bottom: 20px; color: white;">
            <button class="btn-action" style="background: var(--primary); color: white;" onclick="saveProfile()">СОХРАНИТЬ</button>
            <button class="btn-action" style="background: transparent; color: #8b949e;" onclick="closeProfile()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">CYBER CHAT</div>
            <div id="room-list"></div>
            <div class="my-profile" onclick="openProfile()">
                <img src="" id="my-ava" class="avatar">
                <div style="overflow: hidden;">
                    <div id="my-nick-display" style="font-weight: bold; white-space: nowrap; text-overflow: ellipsis;">Загрузка...</div>
                    <div id="my-bio-display" style="font-size: 0.7rem; opacity: 0.6; white-space: nowrap; text-overflow: ellipsis;">В сети</div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-wrapper">
                <div class="input-area">
                    <input type="text" id="m-input" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') send()">
                    <button class="send-btn" onclick="send()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="openDeleteModal()">🗑 Удалить чат</div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";
        let roomToDel = null;

        function login() {
            const nick = document.getElementById('auth-nick').value;
            const pass = document.getElementById('auth-pass').value;
            if(nick) socket.emit('auth', { nick, password: pass });
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('profile-modal').style.display = 'none';
                document.getElementById('my-nick-display').innerText = myData.nick;
                document.getElementById('my-bio-display').innerText = myData.bio || "В сети";
                document.getElementById('my-ava').src = myData.avatar || 'https://i.pravatar.cc/100';
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            document.querySelectorAll('.room-item').forEach(el => {
                el.classList.toggle('active', el.getAttribute('data-id') === id);
            });
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="room-item active" data-id="Общий" onclick="switchRoom('Общий')" oncontextmenu="showContext(event, 'Общий')"># Общий канал</div>`;
            Object.keys(rooms).forEach(id => {
                list.innerHTML += `<div class="room-item" data-id="${id}" onclick="switchRoom('${id}')" oncontextmenu="showContext(event, '${id}')"># ${rooms[id].name}</div>`;
            });
        });

        // Контекстное меню
        function showContext(e, id) {
            e.preventDefault();
            roomToDel = id;
            const menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        function hideContext() { document.getElementById('ctx-menu').style.display = 'none'; }

        function openDeleteModal() { document.getElementById('delete-modal').style.display = 'flex'; hideContext(); }
        function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; }

        function confirmDelete() {
            const forAll = document.getElementById('del-all-check').checked;
            socket.emit('delete_chat', { chat_id: roomToDel, delete_for_all: forAll });
            closeDeleteModal();
        }

        socket.on('chat_deleted_globally', () => location.reload());

        // Остальные функции
        function openProfile() { 
            document.getElementById('edit-avatar').value = myData.avatar;
            document.getElementById('edit-bio').value = myData.bio;
            document.getElementById('profile-modal').style.display = 'flex'; 
        }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
        function saveProfile() {
            socket.emit('update_profile', {
                nick: myData.nick,
                avatar: document.getElementById('edit-avatar').value,
                bio: document.getElementById('edit-bio').value
            });
        }

        function send() {
            const val = document.getElementById('m-input').value;
            if(!val) return;
            socket.emit('message', { room: selectedRoom, text: val, user: myData.nick, avatar: myData.avatar });
            document.getElementById('m-input').value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.user === myData.nick ? 'my' : ''}`;
            div.innerHTML = `
                <img src="${msg.avatar || 'https://i.pravatar.cc/100'}" class="avatar" style="width:30px; height:30px; margin-top:5px;">
                <div style="flex:1">
                    <div style="font-size:0.7rem; color:#8b949e; margin:0 10px 2px">${msg.user}</div>
                    <div class="msg-content">${msg.text}</div>
                </div>
            `;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
