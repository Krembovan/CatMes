<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER CHAT</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { 
            --bg: #0b0e14; --surface: #161b22; --primary: #6e57e0; 
            --accent: #4a90e2; --text: #e6edf3; --border: rgba(255,255,255,0.08); 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Сайдбар */
        .sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .sidebar-header { padding: 10px 15px; font-weight: 900; color: var(--primary); display: flex; justify-content: space-between; align-items: center; }
        
        .section-title { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; margin: 20px 0 10px 15px; letter-spacing: 1px; }
        
        #room-list, #friend-list { display: flex; flex-direction: column; gap: 4px; }
        .item { 
            padding: 10px 15px; cursor: pointer; color: #8b949e; transition: 0.2s; 
            border-radius: 12px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
        }
        .item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .item.active { background: rgba(110, 87, 224, 0.15); color: var(--text); box-shadow: inset 3px 0 0 var(--primary); }

        .req-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; margin-left: auto; }

        /* Профиль */
        .my-profile { margin-top: auto; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid var(--border); }
        .avatar { width: 36px; height: 36px; border-radius: 10px; background: #21262d; object-fit: cover; }

        /* Чат */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { display: flex; gap: 10px; max-width: 80%; }
        .msg.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-content { background: var(--surface); padding: 10px 16px; border-radius: 18px; font-size: 0.9rem; }
        .msg.my .msg-content { background: var(--primary); color: white; }

        /* Поле ввода */
        .input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px 18px; border-radius: 20px; color: white; outline: none; }
        .btn-send { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        /* Модалки */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-card { background: var(--surface); padding: 25px; border-radius: 20px; width: 320px; border: 1px solid var(--border); }
        .btn-modal { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-card">
            <h2 style="text-align:center; color:var(--primary)">CYBER CHAT</h2>
            <input type="text" id="auth-nick" placeholder="Никнейм" style="width:100%; box-sizing:border-box; margin-bottom:10px">
            <input type="password" id="auth-pass" placeholder="Пароль" style="width:100%; box-sizing:border-box; margin-bottom:20px">
            <button class="btn-modal" onclick="login()">ВОЙТИ</button>
        </div>
    </div>

    <div id="friend-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>Добавить друга</h3>
            <input type="text" id="target-nick" placeholder="Введите ник..." style="width:100%; box-sizing:border-box; margin-bottom:15px">
            <button class="btn-modal" onclick="sendFriendRequest()">ОТПРАВИТЬ ЗАПРОС</button>
            <button onclick="document.getElementById('friend-modal').style.display='none'" style="width:100%; background:none; border:none; color:#8b949e; margin-top:10px; cursor:pointer">Отмена</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>CYBER.IO</span>
                <button onclick="document.getElementById('friend-modal').style.display='flex'" style="background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer">+</button>
            </div>

            <div class="section-title">Каналы</div>
            <div id="room-list"></div>

            <div class="section-title">Друзья</div>
            <div id="friend-list">
                </div>

            <div class="my-profile" onclick="openProfile()">
                <img src="" id="my-ava" class="avatar">
                <div style="overflow:hidden">
                    <div id="my-nick-display" style="font-weight:bold">Загрузка...</div>
                    <div id="my-bio-display" style="font-size:0.7rem; opacity:0.6">В сети</div>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <div class="input-area">
                <input type="text" id="m-input" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn-send" onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let myData = null;
        let selectedRoom = "Общий";

        function login() {
            const nick = document.getElementById('auth-nick').value;
            const pass = document.getElementById('auth-pass').value;
            if(nick) socket.emit('auth', { nick, password: pass });
        }

        socket.on('auth_result', (data) => {
            if (data.success) {
                myData = data.user;
                document.getElementById('auth-modal').style.display = 'none';
                document.getElementById('my-nick-display').innerText = myData.nick;
                document.getElementById('my-ava').src = myData.avatar || 'https://i.pravatar.cc/100';
                updateFriendList();
                socket.emit('get_rooms');
                switchRoom("Общий");
            } else { alert(data.error); }
        });

        function sendFriendRequest() {
            const target = document.getElementById('target-nick').value;
            socket.emit('add_friend', { my_nick: myData.nick, target_nick: target });
            document.getElementById('friend-modal').style.display = 'none';
        }

        function updateFriendList() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            
            // Заявки
            myData.requests.forEach(nick => {
                list.innerHTML += `
                    <div class="item" style="border: 1px dashed var(--primary)">
                        <span>👤 ${nick}</span>
                        <button onclick="acceptFriend('${nick}')" class="req-badge" style="cursor:pointer; border:none">Принять</button>
                    </div>`;
            });

            // Друзья
            myData.friends.forEach(nick => {
                list.innerHTML += `<div class="item" onclick="startPrivate('${nick}')">🔵 ${nick}</div>`;
            });
        }

        function acceptFriend(nick) {
            socket.emit('accept_friend', { my_nick: myData.nick, target_nick: nick });
        }

        function startPrivate(nick) {
            const chat_id = "priv_" + [myData.nick.toLowerCase(), nick.toLowerCase()].sort().join('_');
            switchRoom(chat_id);
        }

        function switchRoom(id) {
            selectedRoom = id;
            document.getElementById('messages').innerHTML = '';
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            socket.emit('join', { room: id });
        }

        socket.on('room_list', (rooms) => {
            const list = document.getElementById('room-list');
            list.innerHTML = `<div class="item active" onclick="switchRoom('Общий')"># Общий канал</div>`;
            Object.keys(rooms).forEach(id => {
                if(rooms[id].type !== 'private')
                    list.innerHTML += `<div class="item" onclick="switchRoom('${id}')"># ${rooms[id].name}</div>`;
            });
        });

        socket.on('friend_update', (data) => alert(data.msg));

        function send() {
            const input = document.getElementById('m-input');
            if (!input.value) return;
            socket.emit('message', {
                room: selectedRoom, text: input.value,
                user: myData.nick, avatar: myData.avatar
            });
            input.value = '';
        }

        socket.on('message', (msg) => { if(msg.room === selectedRoom) renderMsg(msg); });
        socket.on('history', (hist) => hist.forEach(renderMsg));

        function renderMsg(msg) {
            const div = document.createElement('div');
            div.className = `msg ${msg.user === myData.nick ? 'my' : ''}`;
            div.innerHTML = `<div class="msg-content"><b>${msg.user}:</b><br>${msg.text}</div>`;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function openProfile() { alert("Настройки в разработке (логика сохранена)"); }
    </script>
</body>
</html>
